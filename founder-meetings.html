<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아 — 받은 제안 · 미팅 · 리뷰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* =========================================================
   모아 (가칭) — 디자인 토큰 (조건등록 화면과 동일 계승)
   ========================================================= */
:root {
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;
  --fs-cap: 13px; --fs-sm: 15px; --fs-base: 17px;
  --fs-lg: 20px; --fs-xl: 26px; --fs-2xl: 34px; --fs-3xl: 42px;
  --radius: 16px; --radius-sm: 12px; --radius-lg: 22px;
  --maxw: 600px;
  --ease: cubic-bezier(.22,.61,.36,1);
  --accent: #5266eb;
  --accent-press: #4255d4;
  /* 상태 색: 대기(중립) / 완료(긍정) — 채도 최소화, Mercury 톤 유지 */
  --ok: #2f9e6f;
  --ok-soft: #e6f4ee;
  --warn: #b8862a;
  --warn-soft: #f6efe0;
}
[data-theme="light"] {
  --bg: #f6f5f2;
  --surface: #ffffff;
  --surface-2: #efece5;
  --border: #e4e0d6;
  --border-strong: #d3cdbe;
  --text: #2a2924;
  --text-2: #5a5548;
  --text-3: #8a8478;
  --shadow: 0 1px 2px rgba(42,41,36,.03), 0 6px 20px rgba(42,41,36,.05);
  --accent-soft: #ecefff;
}
[data-theme="dark"] {
  --bg: #171721;
  --surface: #1e1e2a;
  --surface-2: #272735;
  --border: #2c2c3a;
  --border-strong: #3a3a4a;
  --text: #ededf3;
  --text-2: #a3a3b2;
  --text-3: #6f6f80;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 32px rgba(0,0,0,.4);
  --accent: #5c70ef;
  --accent-soft: #232338;
  --ok: #4bbd8c;
  --ok-soft: #1c3029;
  --warn: #d3a44e;
  --warn-soft: #302a1c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  transition: background .4s var(--ease), color .4s var(--ease);
  -webkit-font-smoothing: antialiased;
}
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

/* ---------- 상단 바 ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-4) var(--sp-5);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: var(--sp-2); font-weight: 800; font-size: var(--fs-lg); letter-spacing: -.02em; }
.brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
.brand small { font-weight: 500; font-size: var(--fs-cap); color: var(--text-3); letter-spacing: 0; }
.theme-btn {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-2); cursor: pointer; transition: all .2s var(--ease);
}
.theme-btn:hover { color: var(--text); border-color: var(--border-strong); }
.theme-btn:active { transform: scale(.94); }

/* ---------- 헤더 ---------- */
.head { max-width: var(--maxw); margin: 0 auto; padding: var(--sp-6) var(--sp-5) var(--sp-4); }
.head .eyebrow { font-size: var(--fs-cap); font-weight: 600; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; margin-bottom: var(--sp-3); }
.head h1 { font-size: var(--fs-2xl); font-weight: 800; letter-spacing: -.03em; line-height: 1.25; margin-bottom: var(--sp-2); }
.head p { font-size: var(--fs-base); color: var(--text-2); }

/* ---------- 리스트 ---------- */
.list { max-width: var(--maxw); margin: 0 auto; padding: var(--sp-4) var(--sp-5) 120px; display: grid; gap: var(--sp-3); }

/* ---------- 제안 카드 ---------- */
.card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: var(--sp-5);
  transition: all .18s var(--ease); animation: fadeUp .4s var(--ease);
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.card-top { display: flex; align-items: flex-start; gap: var(--sp-4); }
.avatar {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: var(--fs-lg); letter-spacing: -.02em;
}
.card-id { flex: 1; min-width: 0; }
.card-id .rep-name { font-weight: 700; font-size: var(--fs-base); letter-spacing: -.01em; }
.card-id .rep-brand { font-size: var(--fs-sm); color: var(--text-2); margin-top: 1px; }
.card-id .rep-rating { display: flex; align-items: center; gap: var(--sp-1); font-size: var(--fs-cap); color: var(--text-3); margin-top: var(--sp-2); }
.card-id .rep-rating .stars { color: var(--warn); letter-spacing: 1px; }

/* 상태 배지 */
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: var(--fs-cap); font-weight: 700; padding: 5px 10px; border-radius: 99px; white-space: nowrap; }
.badge-wait { background: var(--warn-soft); color: var(--warn); }
.badge-ok { background: var(--ok-soft); color: var(--ok); }
.badge-half { background: var(--accent-soft); color: var(--accent); }

.card-body { margin-top: var(--sp-4); padding-top: var(--sp-4); border-top: 1px solid var(--border); }
.benefit { font-size: var(--fs-sm); color: var(--text-2); line-height: 1.6; }

/* 확인 진행 표시 */
.confirm-row { display: flex; gap: var(--sp-4); margin-top: var(--sp-4); }
.confirm-item { display: flex; align-items: center; gap: 6px; font-size: var(--fs-cap); color: var(--text-3); }
.confirm-item.on { color: var(--ok); font-weight: 600; }
.confirm-item .cdot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; }
.confirm-item.on .cdot { background: var(--ok); border-color: var(--ok); }

/* 카드 액션 버튼 */
.card-actions { margin-top: var(--sp-4); display: flex; gap: var(--sp-2); }
.btn {
  font-family: inherit; font-size: var(--fs-sm); font-weight: 700; letter-spacing: -.01em;
  border-radius: var(--radius-sm); cursor: pointer; transition: all .18s var(--ease);
  border: 1.5px solid transparent; padding: var(--sp-3) var(--sp-4); flex: 1;
}
.btn-primary { background: var(--accent); color: #fff; }
[data-theme="dark"] .btn-primary { color: #06120d; }
.btn-primary:hover { background: var(--accent-press); }
.btn-primary:active { transform: scale(.99); }
.btn-primary:disabled { background: var(--surface-2); color: var(--text-3); cursor: not-allowed; }
.btn-ok { background: var(--ok); color: #fff; }
.btn-ok:hover { filter: brightness(.95); }
.btn-outline { background: transparent; border-color: var(--border-strong); color: var(--text-2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-done { background: var(--surface-2); color: var(--text-3); cursor: default; }

/* ---------- 빈 상태 ---------- */
.empty { text-align: center; padding: var(--sp-8) var(--sp-5); color: var(--text-3); }
.empty .empty-ic { font-size: 40px; margin-bottom: var(--sp-4); opacity: .5; }
.empty h3 { font-size: var(--fs-lg); font-weight: 700; color: var(--text-2); margin-bottom: var(--sp-2); }
.empty p { font-size: var(--fs-sm); }

/* 로딩 */
.loading { text-align: center; padding: var(--sp-8); color: var(--text-3); font-size: var(--fs-sm); }

/* ---------- 리뷰 모달 ---------- */
.modal-back {
  position: fixed; inset: 0; z-index: 40; display: none;
  background: color-mix(in srgb, #000 45%, transparent);
  backdrop-filter: blur(3px);
  align-items: flex-end; justify-content: center;
}
.modal-back.open { display: flex; animation: fadeIn .25s var(--ease); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg); width: 100%; max-width: var(--maxw);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: var(--sp-5) var(--sp-5) max(var(--sp-5), env(safe-area-inset-bottom));
  max-height: 90vh; overflow-y: auto;
  animation: slideUp .3s var(--ease);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
.modal-grip { width: 40px; height: 4px; border-radius: 99px; background: var(--border-strong); margin: 0 auto var(--sp-5); }
.modal h2 { font-size: var(--fs-xl); font-weight: 800; letter-spacing: -.02em; margin-bottom: var(--sp-1); }
.modal .modal-sub { font-size: var(--fs-sm); color: var(--text-2); margin-bottom: var(--sp-5); }

/* 별점 항목 */
.rate-item { padding: var(--sp-4) 0; border-bottom: 1px solid var(--border); }
.rate-item:last-of-type { border-bottom: none; }
.rate-item .rate-label { font-size: var(--fs-sm); font-weight: 600; margin-bottom: var(--sp-2); }
.rate-item .rate-hint { font-size: var(--fs-cap); color: var(--text-3); font-weight: 400; }
.stars-input { display: flex; gap: var(--sp-2); }
.star {
  width: 38px; height: 38px; cursor: pointer; background: none; border: none; padding: 0;
  color: var(--border-strong); transition: all .12s var(--ease);
}
.star svg { width: 100%; height: 100%; display: block; }
.star:hover { transform: scale(1.12); }
.star.on { color: var(--warn); }

.modal .field { margin-top: var(--sp-4); }
.modal .field label { display: block; font-size: var(--fs-sm); font-weight: 600; color: var(--text-2); margin-bottom: var(--sp-2); }
.modal .field textarea {
  width: 100%; padding: var(--sp-4); font-size: var(--fs-base); font-family: inherit;
  background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); transition: border-color .18s var(--ease); resize: vertical; min-height: 90px; line-height: 1.6;
}
.modal .field textarea:focus { outline: none; border-color: var(--accent); }
.modal-actions { display: flex; gap: var(--sp-3); margin-top: var(--sp-5); }
.modal-actions .btn { font-size: var(--fs-base); padding: var(--sp-4) var(--sp-5); }
.btn-ghost-lg { background: transparent; border-color: var(--border); color: var(--text-2); flex: 0 0 auto; width: 90px; }

.hidden { display: none !important; }
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">
    <span class="dot"></span> 모아 <small>가칭</small>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="테마 전환">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="head">
  <div class="eyebrow">받은 제안</div>
  <h1>담당자들의 제안이에요</h1>
  <p>만나본 담당자는 미팅 완료를 눌러주세요. 양쪽 다 확인되면 후기를 남길 수 있어요.</p>
</div>

<div class="list" id="list">
  <div class="loading">불러오는 중…</div>
</div>

<!-- 리뷰 모달 -->
<div class="modal-back" id="modalBack">
  <div class="modal" id="modal">
    <div class="modal-grip"></div>
    <h2 id="reviewTitle">후기 남기기</h2>
    <p class="modal-sub" id="reviewSub">솔직한 후기가 다음 창업자에게 큰 도움이 돼요.</p>

    <div class="rate-item">
      <div class="rate-label">친절도 <span class="rate-hint">— 응대가 편안했나요?</span></div>
      <div class="stars-input" data-score="kindness"></div>
    </div>
    <div class="rate-item">
      <div class="rate-label">설명 정확성 <span class="rate-hint">— 과장 없이 사실대로 설명했나요?</span></div>
      <div class="stars-input" data-score="accuracy"></div>
    </div>
    <div class="rate-item">
      <div class="rate-label">응답 속도 <span class="rate-hint">— 연락이 빨랐나요?</span></div>
      <div class="stars-input" data-score="response"></div>
    </div>
    <div class="rate-item">
      <div class="rate-label">조건 이행 <span class="rate-hint">— 약속한 혜택을 지켰나요?</span></div>
      <div class="stars-input" data-score="fulfillment"></div>
    </div>
    <div class="rate-item">
      <div class="rate-label">강매 없음 <span class="rate-hint">— 부담 주지 않았나요?</span></div>
      <div class="stars-input" data-score="nopressure"></div>
    </div>

    <div class="field">
      <label>한 마디 (선택)</label>
      <textarea id="reviewComment" placeholder="어떤 점이 좋았는지 적어주세요."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost-lg" id="reviewCancel">취소</button>
      <button class="btn btn-primary" id="reviewSubmit" disabled>후기 등록</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     Supabase 연결 (조건등록 화면과 동일 값)
     ============================================================ */
  const SUPABASE_URL = "https://wxecxkckbpgzcdegtahy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IVu4Fuyb8pKl5-ZkuYqoKA_iHKTwgpq";
  let sb = null;
  try {
    if (SUPABASE_URL.startsWith("http") && window.supabase) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) { console.warn("Supabase 미연결:", e); }

  /* ============================================================
     현재 로그인한 창업자 식별자 (owner_code)
     로그인 세션(sessionStorage 'moa_user')의 user_code 사용.
     미로그인 시 로그인 화면으로 이동. (개발용 fallback: demo_owner)
     ============================================================ */
  const MOA_USER = (()=>{ try { return JSON.parse(sessionStorage.getItem('moa_user')||'null'); } catch(e){ return null; } })();
  // ⚠️ 배포 전: 아래 3줄 주석 해제 → 미로그인 시 로그인 화면으로 강제 이동
  // if (!MOA_USER || !MOA_USER.user_code) {
  //   location.href = 'login.html';
  // }
  const OWNER_CODE = (MOA_USER && MOA_USER.user_code) || "demo_owner";  // fallback: 개발 테스트용

  const $ = s => document.querySelector(s);
  const listEl = $('#list');

  /* ---- 테마 토글 (원본과 동일) ---- */
  const themeBtn = $('#themeBtn'), themeIcon = $('#themeIcon');
  const sunIcon = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moonIcon = '<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>';
  themeBtn.addEventListener('click', ()=>{
    const b = document.body;
    const dark = b.getAttribute('data-theme') === 'dark';
    b.setAttribute('data-theme', dark ? 'light' : 'dark');
    themeIcon.innerHTML = dark ? sunIcon : moonIcon;
  });

  /* ---- SVG 아이콘 ---- */
  const checkIcon = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  const starSvg = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z"/></svg>';

  /* ---- 상태 ---- */
  let meetings = [];   // 화면에 뿌릴 통합 데이터
  let reviewedIds = new Set();  // 이미 후기 남긴 meeting_id

  /* ============================================================
     데이터 로드
     흐름: proposals(내가 받은 제안) → 각 제안의 미팅 상태(meetings)
           → 이미 남긴 리뷰(reviews)
     ============================================================ */
  async function load(){
    if (!sb) {
      // Supabase 미연결 시 데모 데이터로 화면만 확인
      meetings = demoData();
      render();
      return;
    }
    try {
      // 1) 내 조건(auction_requests) id 목록 — 내 owner_code 기준
      const { data: reqs, error: reqErr } = await sb
        .from('auction_requests').select('id').eq('owner_code', OWNER_CODE);
      if (reqErr) throw reqErr;
      const reqIds = (reqs||[]).map(r=>r.id);

      // 2) 그 조건들에 들어온 제안(proposals)
      let proposals = [];
      if (reqIds.length) {
        const { data: props, error: pErr } = await sb
          .from('proposals').select('*').in('request_id', reqIds);
        if (pErr) throw pErr;
        proposals = props || [];
      }

      // 3) 이 창업자의 미팅(meetings) 전부
      const { data: mts, error: mErr } = await sb
        .from('meetings').select('*').eq('owner_code', OWNER_CODE);
      if (mErr) throw mErr;
      const meetingByProposal = {};
      (mts||[]).forEach(m=>{ meetingByProposal[m.proposal_id] = m; });

      // 4) 이미 남긴 리뷰
      const { data: rvs } = await sb
        .from('reviews').select('meeting_id').eq('owner_code', OWNER_CODE);
      reviewedIds = new Set((rvs||[]).map(r=>r.meeting_id));

      // 5) 제안 + 미팅 상태 병합
      meetings = proposals.map(p=>{
        const m = meetingByProposal[p.id] || null;
        return {
          proposal_id: p.id,
          rep_code: p.rep_code,
          rep_name: p.rep_name || '담당자',
          brand_name: p.brand || p.rep_name || '브랜드',
          benefit: p.benefit || p.message || '',
          meeting_id: m ? m.id : null,
          owner_confirmed: m ? m.owner_confirmed : false,
          rep_confirmed: m ? m.rep_confirmed : false,
          status: m ? m.status : '대기'
        };
      });
      render();
    } catch(e) {
      console.error('로드 실패:', e);
      listEl.innerHTML = '<div class="empty"><div class="empty-ic">⚠️</div><h3>불러오지 못했어요</h3><p>잠시 후 다시 시도해 주세요.</p></div>';
    }
  }

  /* ---- 데모 데이터 (Supabase 미연결 시 렌더 확인용) ---- */
  function demoData(){
    return [
      { proposal_id:'d1', rep_code:'rep_a', rep_name:'김담당', brand_name:'브랜드 A',
        benefit:'첫 3개월 로열티 면제 + 오픈 지원금 500만원을 제안드려요.',
        meeting_id:'m1', owner_confirmed:false, rep_confirmed:false, status:'대기' },
      { proposal_id:'d2', rep_code:'rep_b', rep_name:'이담당', brand_name:'브랜드 B',
        benefit:'인테리어 비용 20% 지원과 상권 분석 리포트를 함께 드려요.',
        meeting_id:'m2', owner_confirmed:false, rep_confirmed:true, status:'대기' },
      { proposal_id:'d3', rep_code:'rep_c', rep_name:'박담당', brand_name:'브랜드 C',
        benefit:'가맹비 전액 면제 + 초도 물품 지원을 약속드려요.',
        meeting_id:'m3', owner_confirmed:true, rep_confirmed:true, status:'완료' }
    ];
  }

  /* ============================================================
     렌더링
     ============================================================ */
  function render(){
    if (!meetings.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-ic">📩</div><h3>아직 받은 제안이 없어요</h3><p>검증된 담당자들이 곧 제안을 보내드려요.</p></div>';
      return;
    }
    listEl.innerHTML = meetings.map(cardHtml).join('');
    bindCards();
  }

  function cardHtml(m){
    const initial = (m.rep_name||'담')[0];
    // 상태 배지
    let badge;
    if (m.status === '완료') badge = '<span class="badge badge-ok">미팅 확인됨</span>';
    else if (m.owner_confirmed || m.rep_confirmed) badge = '<span class="badge badge-half">확인 대기</span>';
    else badge = '<span class="badge badge-wait">제안 도착</span>';

    // 양측 확인 표시
    const ownerOn = m.owner_confirmed ? 'on' : '';
    const repOn = m.rep_confirmed ? 'on' : '';
    const confirmRow = `
      <div class="confirm-row">
        <span class="confirm-item ${ownerOn}"><span class="cdot">${m.owner_confirmed?checkIcon:''}</span>나</span>
        <span class="confirm-item ${repOn}"><span class="cdot">${m.rep_confirmed?checkIcon:''}</span>담당자</span>
      </div>`;

    // 액션 버튼: 상태별 분기
    let actions = '';
    if (m.status === '완료') {
      if (reviewedIds.has(m.meeting_id)) {
        actions = '<button class="btn btn-done" disabled>후기 완료</button>';
      } else {
        actions = `<button class="btn btn-primary act-review" data-pid="${m.proposal_id}">후기 남기기</button>`;
      }
    } else if (m.owner_confirmed) {
      actions = '<button class="btn btn-outline" disabled>담당자 확인 기다리는 중</button>';
    } else {
      actions = `<button class="btn btn-ok act-confirm" data-pid="${m.proposal_id}">미팅 완료</button>`;
    }

    const benefit = m.benefit ? `<div class="card-body"><div class="benefit">${escapeHtml(m.benefit)}</div></div>` : '';

    return `
      <div class="card" data-pid="${m.proposal_id}">
        <div class="card-top">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div class="card-id">
            <div class="rep-name">${escapeHtml(m.rep_name)}</div>
            <div class="rep-brand">${escapeHtml(m.brand_name)}</div>
            <div class="rep-rating"><span class="stars">★★★★☆</span> 후기 준비중</div>
          </div>
          ${badge}
        </div>
        ${benefit}
        ${confirmRow}
        <div class="card-actions">${actions}</div>
      </div>`;
  }

  function bindCards(){
    document.querySelectorAll('.act-confirm').forEach(b=>{
      b.addEventListener('click', ()=>confirmMeeting(b.dataset.pid, b));
    });
    document.querySelectorAll('.act-review').forEach(b=>{
      b.addEventListener('click', ()=>openReview(b.dataset.pid));
    });
  }

  /* ============================================================
     미팅 완료 (창업자 쪽 확인)
     - 미팅 row 없으면 생성, 있으면 owner_confirmed = true
     - 양측 다 true 면 status='완료' 로 갱신
     ============================================================ */
  async function confirmMeeting(pid, btn){
    const m = meetings.find(x=>x.proposal_id===pid);
    if (!m) return;
    btn.disabled = true; btn.textContent = '처리 중…';

    if (!sb) { // 데모
      m.owner_confirmed = true;
      if (m.rep_confirmed) m.status = '완료';
      render(); return;
    }

    try {
      const now = new Date().toISOString();
      if (!m.meeting_id) {
        // 미팅 row 최초 생성 (창업자가 먼저 누른 경우)
        const { data, error } = await sb.from('meetings').insert([{
          proposal_id: m.proposal_id,
          owner_code: OWNER_CODE,
          rep_code: m.rep_code,
          brand_name: m.brand_name,
          owner_confirmed: true,
          owner_confirmed_at: now,
          status: '대기'
        }]).select().single();
        if (error) throw error;
        m.meeting_id = data.id;
        m.owner_confirmed = true;
      } else {
        // 기존 row 업데이트
        const bothDone = m.rep_confirmed; // 상대가 이미 눌렀으면 완료
        const { error } = await sb.from('meetings').update({
          owner_confirmed: true,
          owner_confirmed_at: now,
          status: bothDone ? '완료' : '대기'
        }).eq('id', m.meeting_id);
        if (error) throw error;
        m.owner_confirmed = true;
        if (bothDone) m.status = '완료';
      }
      render();
    } catch(e) {
      console.error('미팅 확인 실패:', e);
      btn.disabled = false; btn.textContent = '미팅 완료';
      alert('처리 중 문제가 생겼어요. 잠시 후 다시 시도해 주세요.');
    }
  }

  /* ============================================================
     리뷰 모달
     ============================================================ */
  const modalBack = $('#modalBack');
  const scores = { kindness:0, accuracy:0, response:0, fulfillment:0, nopressure:0 };
  let activePid = null;

  // 별점 5개 항목 생성
  document.querySelectorAll('.stars-input').forEach(group=>{
    const key = group.dataset.score;
    for (let i=1;i<=5;i++){
      const b = document.createElement('button');
      b.className = 'star'; b.type='button'; b.dataset.val=i;
      b.innerHTML = starSvg;
      b.addEventListener('click', ()=>{
        scores[key] = i;
        group.querySelectorAll('.star').forEach((s,idx)=>s.classList.toggle('on', idx<i));
        checkReviewReady();
      });
      group.appendChild(b);
    }
  });

  function checkReviewReady(){
    const allRated = Object.values(scores).every(v=>v>0);
    $('#reviewSubmit').disabled = !allRated;
  }

  function openReview(pid){
    activePid = pid;
    const m = meetings.find(x=>x.proposal_id===pid);
    Object.keys(scores).forEach(k=>scores[k]=0);
    document.querySelectorAll('.stars-input .star').forEach(s=>s.classList.remove('on'));
    $('#reviewComment').value = '';
    $('#reviewSubmit').disabled = true;
    $('#reviewTitle').textContent = (m ? m.rep_name : '담당자') + ' 님 후기';
    $('#reviewSub').textContent = '솔직한 후기가 다음 창업자에게 큰 도움이 돼요.';
    modalBack.classList.add('open');
  }
  function closeReview(){ modalBack.classList.remove('open'); activePid=null; }

  $('#reviewCancel').addEventListener('click', closeReview);
  modalBack.addEventListener('click', e=>{ if(e.target===modalBack) closeReview(); });

  $('#reviewSubmit').addEventListener('click', async ()=>{
    const m = meetings.find(x=>x.proposal_id===activePid);
    if (!m) return;
    const btn = $('#reviewSubmit');
    btn.disabled = true; btn.textContent = '등록 중…';

    if (!sb) { // 데모
      reviewedIds.add(m.meeting_id);
      closeReview(); render();
      btn.textContent = '후기 등록';
      return;
    }

    try {
      const { error } = await sb.from('reviews').insert([{
        meeting_id: m.meeting_id,
        owner_code: OWNER_CODE,
        rep_code: m.rep_code,
        score_kindness: scores.kindness,
        score_accuracy: scores.accuracy,
        score_response: scores.response,
        score_fulfillment: scores.fulfillment,
        score_nopressure: scores.nopressure,
        comment: $('#reviewComment').value.trim() || null
      }]);
      if (error) throw error;
      reviewedIds.add(m.meeting_id);
      closeReview(); render();
      btn.textContent = '후기 등록';
    } catch(e) {
      console.error('리뷰 등록 실패:', e);
      btn.disabled = false; btn.textContent = '후기 등록';
      alert('등록 중 문제가 생겼어요. 잠시 후 다시 시도해 주세요.');
    }
  });

  /* ---- 유틸 ---- */
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  load();
})();
</script>
</body>
</html>
