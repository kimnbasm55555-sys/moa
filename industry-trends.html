<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아 — 업종별 창업 트렌드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px;
  --fs-cap:13px; --fs-sm:15px; --fs-base:17px; --fs-lg:20px; --fs-xl:26px; --fs-2xl:34px;
  --radius:16px; --radius-sm:12px; --radius-lg:22px; --maxw:720px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --accent:#5266eb; --accent-press:#4255d4;
  --ok:#2f9e6f; --ok-soft:#e6f4ee; --warn:#b8862a; --warn-soft:#f6efe0; --danger:#c65b4e;
}
[data-theme="light"] {
  --bg:#f6f5f2; --surface:#ffffff; --surface-2:#efece5; --border:#e4e0d6; --border-strong:#d3cdbe;
  --text:#2a2924; --text-2:#5a5548; --text-3:#8a8478;
  --shadow:0 1px 2px rgba(42,41,36,.03),0 6px 20px rgba(42,41,36,.05); --accent-soft:#ecefff;
}
[data-theme="dark"] {
  --bg:#171721; --surface:#1e1e2a; --surface-2:#272735; --border:#2c2c3a; --border-strong:#3a3a4a;
  --text:#ededf3; --text-2:#a3a3b2; --text-3:#6f6f80;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.4);
  --accent:#5c70ef; --accent-soft:#232338; --ok:#4bbd8c; --ok-soft:#1c3029; --warn:#d3a44e; --warn-soft:#302a1c; --danger:#dd7568;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; }
body {
  font-family:'Pretendard',-apple-system,sans-serif; background:var(--bg); color:var(--text);
  line-height:1.55; transition:background .4s var(--ease),color .4s var(--ease); -webkit-font-smoothing:antialiased;
}
@media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important;} }

.topbar {
  position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
  padding:var(--sp-4) var(--sp-5); background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
}
.brand { display:flex; align-items:center; gap:var(--sp-2); font-weight:800; font-size:var(--fs-lg); letter-spacing:-.02em; }
.brand .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft); }
.brand small { font-weight:500; font-size:var(--fs-cap); color:var(--text-3); letter-spacing:0; }
.theme-btn { display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border); color:var(--text-2); cursor:pointer; transition:all .2s var(--ease); }
.theme-btn:hover { color:var(--text); border-color:var(--border-strong); }

.head { max-width:var(--maxw); margin:0 auto; padding:var(--sp-6) var(--sp-5) var(--sp-4); }
.head .eyebrow { font-size:var(--fs-cap); font-weight:600; color:var(--text-3); letter-spacing:.04em; text-transform:uppercase; margin-bottom:var(--sp-3); }
.head h1 { font-size:var(--fs-2xl); font-weight:800; letter-spacing:-.03em; line-height:1.25; margin-bottom:var(--sp-2); }
.head p { font-size:var(--fs-base); color:var(--text-2); }

.wrap { max-width:var(--maxw); margin:0 auto; padding:0 var(--sp-5) 100px; }

/* KPI 하이라이트 3장 */
.kpi-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--sp-3); margin-bottom:var(--sp-5); }
@media (max-width:560px){ .kpi-row{ grid-template-columns:1fr; } }
.kpi {
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:var(--sp-5);
  animation:fadeUp .35s var(--ease);
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
.kpi .kpi-cap { font-size:var(--fs-cap); font-weight:600; color:var(--text-3); margin-bottom:var(--sp-2); }
.kpi .kpi-val { font-size:var(--fs-xl); font-weight:800; letter-spacing:-.02em; }
.kpi .kpi-sub { font-size:var(--fs-cap); color:var(--text-2); margin-top:2px; }
.kpi.ok .kpi-val { color:var(--ok); }
.kpi.warn .kpi-val { color:var(--warn); }
.kpi.accent .kpi-val { color:var(--accent); }

/* 섹션 카드 */
.section { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:var(--sp-5); margin-bottom:var(--sp-4); animation:fadeUp .4s var(--ease); }
.section h2 { font-size:var(--fs-lg); font-weight:800; letter-spacing:-.02em; margin-bottom:var(--sp-1); }
.section .sec-sub { font-size:var(--fs-cap); color:var(--text-3); margin-bottom:var(--sp-4); }
.chart-box { position:relative; height:300px; }
.chart-box.tall { height:340px; }

/* 업종 비교 테이블(카드형) */
.ind-list { display:grid; gap:var(--sp-3); }
.ind-card { border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:var(--sp-4); }
.ind-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp-3); }
.ind-name { display:flex; align-items:center; gap:var(--sp-2); font-weight:700; font-size:var(--fs-base); }
.ind-rank { font-size:var(--fs-cap); font-weight:700; color:#fff; background:var(--accent); padding:2px 9px; border-radius:99px; }
.ind-rank.r1 { background:var(--warn); }
.ind-metrics { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-2) var(--sp-4); }
.ind-metric { display:flex; align-items:center; justify-content:space-between; font-size:var(--fs-cap); }
.ind-metric .m-k { color:var(--text-3); }
.ind-metric .m-v { font-weight:700; }
.ind-metric .m-v.good { color:var(--ok); }
.ind-metric .m-v.bad { color:var(--danger); }

.loading { text-align:center; padding:var(--sp-8); color:var(--text-3); }
.sample-note { font-size:11px; color:var(--text-3); background:var(--surface-2); border-radius:var(--radius-sm); padding:var(--sp-3) var(--sp-4); line-height:1.5; margin-bottom:var(--sp-5); }
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand"><span class="dot"></span> 모아 <small>창업 트렌드</small></div>
  <button class="theme-btn" id="themeBtn" aria-label="테마 전환">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="head">
  <div class="eyebrow">업종별 창업 트렌드</div>
  <h1>어떤 업종이 좋을까요?</h1>
  <p>안정성·수익성·진입장벽을 업종별로 한눈에 비교해보세요.</p>
</div>

<div class="wrap" id="wrap">
  <div class="loading">불러오는 중…</div>
</div>

<script>
(function(){
  "use strict";
  const SUPABASE_URL = "https://wxecxkckbpgzcdegtahy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IVu4Fuyb8pKl5-ZkuYqoKA_iHKTwgpq";
  let sb = null;
  try { if (SUPABASE_URL.startsWith("http") && window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch(e){ console.warn("Supabase 미연결:", e); }

  const $ = s=>document.querySelector(s);

  /* 테마 */
  const themeBtn=$('#themeBtn'), themeIcon=$('#themeIcon');
  const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon='<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>';
  themeBtn.addEventListener('click',()=>{
    const b=document.body,d=b.getAttribute('data-theme')==='dark';
    b.setAttribute('data-theme',d?'light':'dark'); themeIcon.innerHTML=d?sun:moon;
    if(chartsReady) rebuildCharts();
  });

  let trends = [];
  let chartsReady = false;
  let barChart, radarChart;

  async function load(){
    if (!sb){ trends = demo(); build(); return; }
    try {
      const { data, error } = await sb.from('industry_trends').select('*');
      if (error) throw error;
      trends = data||[];
      build();
    } catch(e){
      console.error('트렌드 로드 실패:',e);
      trends = demo(); build();
    }
  }
  function demo(){
    return [
      {industry:'편의점',brand_count:1,avg_startup_cost:7500,avg_close_rate:2.1,avg_store_sales:190000000,avg_store_count:3200,shopinshop_pct:0},
      {industry:'햄버거',brand_count:1,avg_startup_cost:10500,avg_close_rate:3.9,avg_store_sales:520000000,avg_store_count:310,shopinshop_pct:0},
      {industry:'치킨',brand_count:2,avg_startup_cost:5750,avg_close_rate:4.2,avg_store_sales:365000000,avg_store_count:1025,shopinshop_pct:50},
      {industry:'카페',brand_count:1,avg_startup_cost:9000,avg_close_rate:4.4,avg_store_sales:280000000,avg_store_count:640,shopinshop_pct:0},
      {industry:'분식',brand_count:1,avg_startup_cost:4000,avg_close_rate:6.8,avg_store_sales:210000000,avg_store_count:420,shopinshop_pct:100}
    ];
  }

  function build(){
    if(!trends.length){ $('#wrap').innerHTML='<div class="loading">데이터가 없어요.</div>'; return; }

    // 하이라이트 계산
    const mostStable = [...trends].sort((a,b)=>a.avg_close_rate-b.avg_close_rate)[0];
    const highestSales = [...trends].sort((a,b)=>b.avg_store_sales-a.avg_store_sales)[0];
    const lowestCost = [...trends].sort((a,b)=>a.avg_startup_cost-b.avg_startup_cost)[0];

    $('#wrap').innerHTML = `
      <div class="kpi-row">
        <div class="kpi ok">
          <div class="kpi-cap">가장 안정적</div>
          <div class="kpi-val">${esc(mostStable.industry)}</div>
          <div class="kpi-sub">폐점률 ${mostStable.avg_close_rate}%</div>
        </div>
        <div class="kpi warn">
          <div class="kpi-cap">가장 높은 매출</div>
          <div class="kpi-val">${esc(highestSales.industry)}</div>
          <div class="kpi-sub">점포당 연 ${(highestSales.avg_store_sales/1e8).toFixed(1)}억</div>
        </div>
        <div class="kpi accent">
          <div class="kpi-cap">가장 낮은 창업비</div>
          <div class="kpi-val">${esc(lowestCost.industry)}</div>
          <div class="kpi-sub">약 ${fmtMan(lowestCost.avg_startup_cost)}</div>
        </div>
      </div>

      <div class="sample-note">지금은 예시 데이터예요. 공정거래위원회 공식 데이터를 연결하면 전국 실제 업종 지표로 바뀌어요.</div>

      <div class="section">
        <h2>창업비용 vs 폐점률</h2>
        <div class="sec-sub">막대=평균 창업비용(만원), 점=폐점률(%). 왼쪽 아래일수록 부담 적고 안정적</div>
        <div class="chart-box"><canvas id="barChart"></canvas></div>
      </div>

      <div class="section">
        <h2>업종 종합 비교</h2>
        <div class="sec-sub">안정성·수익성·진입 용이성·규모를 100점 환산해 비교</div>
        <div class="chart-box tall"><canvas id="radarChart"></canvas></div>
      </div>

      <div class="section">
        <h2>업종별 상세</h2>
        <div class="sec-sub">폐점률 낮은(안정적인) 순</div>
        <div class="ind-list">${indCards()}</div>
      </div>
    `;
    buildCharts();
    chartsReady = true;
  }

  function indCards(){
    const sorted=[...trends].sort((a,b)=>a.avg_close_rate-b.avg_close_rate);
    return sorted.map((t,i)=>{
      const closeGood = t.avg_close_rate < 4;
      return `
      <div class="ind-card">
        <div class="ind-head">
          <div class="ind-name"><span class="ind-rank ${i===0?'r1':''}">${i+1}위</span> ${esc(t.industry)}</div>
          <span style="font-size:var(--fs-cap);color:var(--text-3)">브랜드 ${t.brand_count}개</span>
        </div>
        <div class="ind-metrics">
          <div class="ind-metric"><span class="m-k">평균 창업비</span><span class="m-v">${fmtMan(t.avg_startup_cost)}</span></div>
          <div class="ind-metric"><span class="m-k">폐점률</span><span class="m-v ${closeGood?'good':'bad'}">${t.avg_close_rate}%</span></div>
          <div class="ind-metric"><span class="m-k">점포당 매출</span><span class="m-v">연 ${(t.avg_store_sales/1e8).toFixed(1)}억</span></div>
          <div class="ind-metric"><span class="m-k">평균 가맹점</span><span class="m-v">${t.avg_store_count.toLocaleString()}개</span></div>
        </div>
      </div>`;
    }).join('');
  }

  function themeColors(){
    const cs = getComputedStyle(document.body);
    return {
      text: cs.getPropertyValue('--text').trim(),
      text2: cs.getPropertyValue('--text-2').trim(),
      text3: cs.getPropertyValue('--text-3').trim(),
      border: cs.getPropertyValue('--border').trim(),
      accent: cs.getPropertyValue('--accent').trim(),
      warn: cs.getPropertyValue('--warn').trim(),
      ok: cs.getPropertyValue('--ok').trim()
    };
  }

  function buildCharts(){
    const c = themeColors();
    const labels = trends.map(t=>t.industry);

    // 막대(창업비) + 선(폐점률) 콤보
    barChart = new Chart($('#barChart'), {
      data:{
        labels,
        datasets:[
          { type:'bar', label:'평균 창업비용(만원)', data:trends.map(t=>t.avg_startup_cost),
            backgroundColor:c.accent+'cc', borderRadius:6, yAxisID:'y', order:2 },
          { type:'line', label:'폐점률(%)', data:trends.map(t=>t.avg_close_rate),
            borderColor:c.warn, backgroundColor:c.warn, tension:.3, yAxisID:'y1', order:1,
            pointRadius:5, pointHoverRadius:7 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:c.text2, font:{family:'Pretendard',size:12} } } },
        scales:{
          x:{ ticks:{ color:c.text2, font:{family:'Pretendard'} }, grid:{ display:false } },
          y:{ position:'left', ticks:{ color:c.text3, font:{family:'Pretendard'} }, grid:{ color:c.border }, title:{display:true,text:'창업비(만원)',color:c.text3,font:{family:'Pretendard'}} },
          y1:{ position:'right', ticks:{ color:c.warn, font:{family:'Pretendard'} }, grid:{ display:false }, title:{display:true,text:'폐점률(%)',color:c.warn,font:{family:'Pretendard'}} }
        }
      }
    });

    // 레이더(종합) — 지표 100점 환산
    const maxCost = Math.max(...trends.map(t=>t.avg_startup_cost));
    const maxSales = Math.max(...trends.map(t=>t.avg_store_sales));
    const maxCount = Math.max(...trends.map(t=>t.avg_store_count));
    const maxClose = Math.max(...trends.map(t=>t.avg_close_rate));
    const palette = [c.accent, c.warn, c.ok, '#a15fd0', '#d0705f'];
    radarChart = new Chart($('#radarChart'), {
      type:'radar',
      data:{
        labels:['안정성','수익성','진입 용이','규모','유연성'],
        datasets: trends.map((t,i)=>({
          label:t.industry,
          data:[
            Math.round((1 - t.avg_close_rate/maxClose)*100),        // 안정성(폐점률 역)
            Math.round(t.avg_store_sales/maxSales*100),             // 수익성
            Math.round((1 - t.avg_startup_cost/maxCost)*100),       // 진입 용이(창업비 역)
            Math.round(t.avg_store_count/maxCount*100),             // 규모
            t.shopinshop_pct                                        // 유연성(샵인샵)
          ],
          borderColor:palette[i%palette.length],
          backgroundColor:palette[i%palette.length]+'22',
          borderWidth:2, pointRadius:3
        }))
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{ color:c.text2, font:{family:'Pretendard',size:12} } } },
        scales:{ r:{
          angleLines:{ color:c.border }, grid:{ color:c.border },
          pointLabels:{ color:c.text2, font:{family:'Pretendard',size:13} },
          ticks:{ display:false, stepSize:25 }, suggestedMin:0, suggestedMax:100
        } }
      }
    });
  }

  function rebuildCharts(){
    if(barChart) barChart.destroy();
    if(radarChart) radarChart.destroy();
    buildCharts();
  }

  function fmtMan(v){ if(v==null)return '-'; if(v>=10000)return (v/10000).toFixed(1).replace(/\.0$/,'')+'억'; return Math.round(v).toLocaleString()+'만'; }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  load();
})();
</script>
</body>
</html>
