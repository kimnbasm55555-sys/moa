<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;}
body{background:#dde1e8;padding:20px;display:flex;justify-content:center;}
.phone{width:390px;background:#f4f6fb;border-radius:36px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.2);position:relative;height:844px;}
/* 딤 배경 */
.dim{position:absolute;inset:0;background:rgba(25,31,40,.5);display:flex;align-items:flex-end;}
/* 바텀시트 모달 */
.sheet{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 32px;animation:up .3s cubic-bezier(.22,.61,.36,1);}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet-grip{width:40px;height:4px;background:#e4e8ee;border-radius:2px;margin:0 auto 22px;}
.sheet-ic{width:64px;height:64px;border-radius:20px;background:#e8f2ff;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.sheet-ic svg{width:32px;height:32px;color:#3182f6;}
.sheet h2{font-size:21px;font-weight:800;color:#191f28;text-align:center;letter-spacing:-.02em;line-height:1.4;margin-bottom:10px;}
.sheet p{font-size:14px;color:#8b95a1;text-align:center;line-height:1.6;margin-bottom:8px;}
.quota{display:flex;align-items:center;justify-content:center;gap:6px;margin:18px 0 24px;padding:12px;background:#f8fafc;border-radius:14px;font-size:13px;color:#4e5968;font-weight:600;}
.quota b{color:#3182f6;}
.kakao-btn{width:100%;background:#fee500;color:#191600;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.later-btn{width:100%;background:transparent;color:#adb5bd;border:none;padding:12px;font-size:14px;font-weight:600;font-family:inherit;}
.share-hint{font-size:12px;color:#c4ccd6;text-align:center;margin-top:6px;line-height:1.5;}
</style></head>
<body>
<div class="phone">
  <div class="dim">
    <div class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
      </div>
      <h2>친구에게 모아를 알리면<br>상담 신청 1회가 추가돼요</h2>
      <p>창업을 준비하는 지인에게 도움이 되는 정보를 나눠보세요. 공유하면 바로 상담을 이어갈 수 있어요.</p>
      <div class="quota">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3182f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        남은 무료 상담 <b>0회</b> · 공유하면 <b>+1회</b>
      </div>
      <button class="kakao-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.5 3 2 6.5 2 10.8c0 2.8 1.9 5.2 4.7 6.6-.2.7-.7 2.6-.8 3-.1.5.2.5.4.4.2-.1 2.6-1.8 3.6-2.5.7.1 1.4.2 2.1.2 5.5 0 10-3.5 10-7.8S17.5 3 12 3z"/></svg>
        카카오톡으로 공유하기
      </button>
      <button class="later-btn">나중에 할게요</button>
      <div class="share-hint">공유는 상대방이 앱을 설치하지 않아도 됩니다</div>
    </div>
  </div>
</div>
</body></html>
