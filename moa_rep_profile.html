<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아 — 영업사원 프로필 등록</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:28px;--sp-7:40px;
  --fs-cap:12px;--fs-xs:13px;--fs-sm:14px;--fs-base:16px;--fs-lg:19px;--fs-xl:23px;--fs-2xl:27px;
  --radius:14px;--radius-sm:10px;--maxw:560px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --accent:#4263eb;--accent-press:#3a56d4;
}
[data-theme="light"]{
  --bg:#f4f5f7;--surface:#ffffff;--surface-2:#eef0f3;--hover:#fafbfc;
  --border:#e6e8ec;--border-strong:#d5d9df;
  --text:#1a1c1f;--text-2:#5c636e;--text-muted:#9aa0ab;
  --shadow:0 1px 2px rgba(20,22,26,.03),0 6px 20px rgba(20,22,26,.05);
  --accent-soft:#eef1ff;--good:#12b886;
}
[data-theme="dark"]{
  --bg:#16181d;--surface:#1c1f26;--surface-2:#22262e;--hover:#22262e;
  --border:#2a2e37;--border-strong:#373c47;
  --text:#eceef1;--text-2:#a0a6b0;--text-muted:#6b7280;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.4);
  --accent:#5c7cfa;--accent-soft:#232838;--good:#20c997;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:100px;
  transition:background .35s var(--ease),color .35s var(--ease)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:var(--sp-4) var(--sp-5);background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:var(--sp-2);font-weight:800;font-size:var(--fs-lg);letter-spacing:-.02em}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand small{font-weight:600;font-size:var(--fs-cap);color:#fff;background:var(--accent);padding:2px 7px;border-radius:99px}
[data-theme="dark"] .brand small{color:#0c0f18}
.theme-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;
  background:transparent;border:1px solid var(--border);color:var(--text-2);cursor:pointer}
.theme-btn:hover{color:var(--text);border-color:var(--border-strong)}

.wrap{max-width:var(--maxw);margin:0 auto;padding:var(--sp-6) var(--sp-5)}
.wrap h1{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-.03em;margin-bottom:var(--sp-2)}
.wrap .lead{font-size:var(--fs-sm);color:var(--text-2);margin-bottom:var(--sp-6)}

.sec{margin-bottom:var(--sp-6)}
.sec-t{font-size:var(--fs-sm);font-weight:700;margin-bottom:var(--sp-3)}
.sec-t .opt{font-weight:500;color:var(--text-muted);font-size:var(--fs-xs)}

.field{margin-bottom:var(--sp-4)}
.field label{display:block;font-size:var(--fs-xs);font-weight:600;color:var(--text-2);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:12px var(--sp-4);font-size:var(--fs-sm);font-family:inherit;
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:64px;line-height:1.5}
.row2{display:flex;gap:var(--sp-3)}
.row2 .field{flex:1}

/* 유도 배너 */
.nudge{display:flex;gap:var(--sp-3);align-items:flex-start;font-size:var(--fs-xs);color:var(--text-2);
  background:var(--accent-soft);padding:var(--sp-3) var(--sp-4);border-radius:var(--radius-sm);margin-bottom:var(--sp-4);line-height:1.5}
.nudge svg{flex-shrink:0;color:var(--accent);margin-top:1px}

/* 얼굴 업로드 */
.face-up{display:flex;align-items:center;gap:var(--sp-4)}
.face-preview{width:80px;height:80px;border-radius:50%;background:var(--surface-2);border:2px dashed var(--border-strong);
  display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer;position:relative}
.face-preview img{width:100%;height:100%;object-fit:cover}
.face-preview .ph{color:var(--text-muted);font-size:22px}
.face-up .up-btn{font-family:inherit;font-size:var(--fs-sm);font-weight:600;color:var(--accent);
  background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px var(--sp-4);cursor:pointer}
.face-up .up-btn:hover{border-color:var(--accent)}

/* 영상 업로드 */
.media-up{border:2px dashed var(--border-strong);border-radius:var(--radius);padding:var(--sp-5);text-align:center;
  cursor:pointer;transition:border-color .18s var(--ease)}
.media-up:hover{border-color:var(--accent)}
.media-up .ic{font-size:28px;margin-bottom:var(--sp-2);opacity:.5}
.media-up .t{font-size:var(--fs-sm);font-weight:600;margin-bottom:2px}
.media-up .d{font-size:var(--fs-cap);color:var(--text-muted)}
.media-preview{margin-top:var(--sp-3);border-radius:var(--radius);overflow:hidden;display:none}
.media-preview.on{display:block}
.media-preview video{width:100%;max-height:300px;background:#000;display:block}

/* 사진 그리드 */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-2);margin-top:var(--sp-3)}
.photo-item{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-2);position:relative}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-item .del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;
  background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.photo-add{aspect-ratio:1;border:2px dashed var(--border-strong);border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:24px}
.photo-add:hover{border-color:var(--accent);color:var(--accent)}

.up-status{font-size:var(--fs-cap);color:var(--accent);margin-top:var(--sp-2);display:none}
.up-status.on{display:block}

/* 하단 저장 */
.savebar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:color-mix(in srgb,var(--bg) 90%,transparent);
  backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:var(--sp-4) var(--sp-5);
  padding-bottom:max(var(--sp-4),env(safe-area-inset-bottom))}
.savebar-inner{max-width:var(--maxw);margin:0 auto}
.btn-save{width:100%;font-family:inherit;font-size:var(--fs-base);font-weight:700;
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:15px;cursor:pointer;transition:background .18s var(--ease)}
[data-theme="dark"] .btn-save{color:#0c0f18}
.btn-save:hover{background:var(--accent-press)}
.btn-save:disabled{background:var(--surface-2);color:var(--text-muted);cursor:not-allowed}

.hidden-input{display:none}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand"><span class="dot"></span> 모아 <small>영업</small></div>
  <button class="theme-btn" id="themeBtn" aria-label="테마 전환">
    <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="wrap">
  <h1>내 프로필 등록</h1>
  <div class="lead">한 번 등록하면 제안할 때마다 자동으로 사용돼요.</div>

  <!-- 기본 정보 -->
  <div class="sec">
    <div class="sec-t">기본 정보</div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="name" placeholder="예: 이현우">
    </div>
    <div class="field">
      <label>브랜드 <span class="opt-label" style="color:var(--text-muted);font-weight:400">(정식 오픈 시 승인제)</span></label>
      <input type="text" id="brand" placeholder="예: 프리미엄 버거 브랜드">
    </div>
    <div class="row2">
      <div class="field">
        <label>경력</label>
        <input type="text" id="career" placeholder="예: 가맹영업">
      </div>
      <div class="field">
        <label>연차</label>
        <input type="text" id="careerYears" placeholder="예: 4년차">
      </div>
    </div>
  </div>

  <!-- 얼굴 + 좌우명 (유도) -->
  <div class="sec">
    <div class="sec-t">얼굴 · 좌우명 <span class="opt">선택 · 올리면 선택률이 올라가요</span></div>
    <div class="nudge">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      얼굴과 좌우명을 등록한 담당자가 창업자에게 더 많이 선택돼요. 강제는 아니에요.
    </div>
    <div class="field">
      <label>얼굴 사진</label>
      <div class="face-up">
        <div class="face-preview" id="facePreview">
          <span class="ph">＋</span>
        </div>
        <button class="up-btn" id="faceBtn">사진 선택</button>
        <input type="file" id="faceInput" class="hidden-input" accept="image/*">
      </div>
      <div class="up-status" id="faceStatus">업로드 중...</div>
    </div>
    <div class="field">
      <label>좌우명 한 줄</label>
      <input type="text" id="motto" placeholder="예: 무리한 권유는 하지 않습니다">
    </div>
  </div>

  <!-- 쇼츠 영상 -->
  <div class="sec">
    <div class="sec-t">브랜드 소개 영상 <span class="opt">선택 · 최대 35초</span></div>
    <div class="media-up" id="videoUp">
      <div class="ic">🎬</div>
      <div class="t">쇼츠 영상 올리기</div>
      <div class="d">우리 브랜드를 자랑하세요 (광고 영상도 OK)</div>
      <input type="file" id="videoInput" class="hidden-input" accept="video/*">
    </div>
    <div class="up-status" id="videoStatus">업로드 중...</div>
    <div class="media-preview" id="videoPreview">
      <video id="videoEl" controls playsinline></video>
    </div>
  </div>

  <!-- 매장 사진 -->
  <div class="sec">
    <div class="sec-t">매장 · 인테리어 사진 <span class="opt">선택 · 여러 장</span></div>
    <div class="photo-grid" id="photoGrid">
      <div class="photo-add" id="photoAdd">＋</div>
    </div>
    <input type="file" id="photoInput" class="hidden-input" accept="image/*" multiple>
    <div class="up-status" id="photoStatus">업로드 중...</div>
  </div>

</div>

<div class="savebar">
  <div class="savebar-inner">
    <button class="btn-save" id="btnSave" disabled>프로필 저장</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);

  const SUPABASE_URL = "https://wxecxkckbpgzcdegtahy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IVu4Fuyb8pKl5-ZkuYqoKA_iHKTwgpq";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const BUCKET = 'rep-media';

  /* 테마 */
  const themeBtn=$('#themeBtn'),themeIcon=$('#themeIcon');
  const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon='<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>';
  themeBtn.addEventListener('click',()=>{
    const d=document.body.getAttribute('data-theme')==='dark';
    document.body.setAttribute('data-theme',d?'light':'dark');
    themeIcon.innerHTML=d?sun:moon;
  });

  // 업로드된 URL 저장
  const media={ face:null, video:null, photos:[] };

  // 고유 파일명 생성
  function uid(){ return Date.now()+'_'+Math.random().toString(36).slice(2,8); }

  // 공통 업로드 함수
  async function uploadFile(file, prefix){
    const ext = file.name.split('.').pop();
    const path = prefix+'/'+uid()+'.'+ext;
    const { error } = await sb.storage.from(BUCKET).upload(path, file, {cacheControl:'3600', upsert:false});
    if(error){ throw error; }
    const { data } = sb.storage.from(BUCKET).getPublicUrl(path);
    return data.publicUrl;
  }

  /* 얼굴 업로드 */
  $('#faceBtn').addEventListener('click',()=>$('#faceInput').click());
  $('#facePreview').addEventListener('click',()=>$('#faceInput').click());
  $('#faceInput').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    $('#faceStatus').classList.add('on');
    try{
      const url=await uploadFile(file,'face');
      media.face=url;
      $('#facePreview').innerHTML='<img src="'+url+'">';
      $('#faceStatus').classList.remove('on');
      checkSave();
    }catch(err){ $('#faceStatus').textContent='업로드 실패: '+err.message; }
  });

  /* 영상 업로드 (35초 체크) */
  $('#videoUp').addEventListener('click',()=>$('#videoInput').click());
  $('#videoInput').addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    // 길이 체크
    const tmp=document.createElement('video');
    tmp.preload='metadata';
    tmp.onloadedmetadata=async ()=>{
      URL.revokeObjectURL(tmp.src);
      if(tmp.duration>36){ alert('영상은 최대 35초까지예요. (현재 '+Math.round(tmp.duration)+'초)'); return; }
      $('#videoStatus').classList.add('on');
      try{
        const url=await uploadFile(file,'video');
        media.video=url;
        $('#videoEl').src=url;
        $('#videoPreview').classList.add('on');
        $('#videoStatus').classList.remove('on');
      }catch(err){ $('#videoStatus').textContent='업로드 실패: '+err.message; }
    };
    tmp.src=URL.createObjectURL(file);
  });

  /* 사진 업로드 (여러 장) */
  $('#photoAdd').addEventListener('click',()=>$('#photoInput').click());
  $('#photoInput').addEventListener('change',async e=>{
    const files=Array.from(e.target.files); if(!files.length) return;
    $('#photoStatus').classList.add('on');
    for(const file of files){
      try{
        const url=await uploadFile(file,'photo');
        media.photos.push(url);
        addPhotoTile(url);
      }catch(err){ console.error('사진 업로드 실패',err); }
    }
    $('#photoStatus').classList.remove('on');
  });
  function addPhotoTile(url){
    const add=$('#photoAdd');
    const tile=document.createElement('div');
    tile.className='photo-item';
    tile.innerHTML='<img src="'+url+'"><button class="del">×</button>';
    tile.querySelector('.del').addEventListener('click',()=>{
      media.photos=media.photos.filter(u=>u!==url);
      tile.remove();
    });
    add.parentNode.insertBefore(tile,add);
  }

  /* 필수 입력 체크 */
  const req=['#name','#brand','#career','#careerYears'];
  function checkSave(){
    const ok=req.every(s=>$(s).value.trim());
    $('#btnSave').disabled=!ok;
  }
  req.forEach(s=>$(s).addEventListener('input',checkSave));

  /* 저장 */
  $('#btnSave').addEventListener('click',async ()=>{
    $('#btnSave').disabled=true; $('#btnSave').textContent='저장 중...';
    const { error } = await sb.from('rep_profiles').insert([{
      rep_code: 'rep_'+uid(),
      name: $('#name').value.trim(),
      brand: $('#brand').value.trim(),
      career: $('#career').value.trim(),
      career_years: $('#careerYears').value.trim(),
      motto: $('#motto').value.trim(),
      face_url: media.face,
      video_url: media.video,
      photo_urls: media.photos
    }]);
    if(error){
      $('#btnSave').disabled=false; $('#btnSave').textContent='프로필 저장';
      alert('저장 실패: '+error.message); return;
    }
    $('#btnSave').textContent='✓ 저장 완료';
    setTimeout(()=>{ alert('프로필이 저장됐어요! 이제 제안할 때 자동으로 사용돼요.'); },300);
  });
})();
</script>
</body>
</html>
