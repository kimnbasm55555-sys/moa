<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;}
body{background:#dde1e8;padding:20px;display:flex;justify-content:center;}
.phone{width:390px;background:#f4f6fb;border-radius:36px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.2);position:relative;height:844px;}
.status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:600;color:#191f28;}
.scroll{height:726px;overflow-y:auto;padding-bottom:20px;}
.scroll::-webkit-scrollbar{display:none;}
svg{display:block;}

.hd{padding:8px 20px 14px;}
.hd .title{font-size:20px;font-weight:800;color:#191f28;letter-spacing:-.02em;}

/* 프로필 카드 */
.profile{margin:0 16px 14px;background:#fff;border-radius:18px;padding:20px;box-shadow:0 2px 10px rgba(60,80,140,.05);}
.pf-top{display:flex;align-items:center;gap:14px;}
.pf-av{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,#3182f6,#4d94ff);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;}
.pf-info{flex:1;}
.pf-nm{font-size:18px;font-weight:800;color:#191f28;}
.pf-cond{font-size:13px;color:#8b95a1;margin-top:3px;}
.pf-edit{font-size:12px;color:#3182f6;font-weight:700;background:#e8f2ff;padding:8px 12px;border-radius:10px;}

/* 창업 준비도 */
.ready{margin:16px 0 0;padding:16px;background:#f8fafc;border-radius:14px;}
.ready-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ready-label{font-size:13px;font-weight:700;color:#191f28;display:flex;align-items:center;gap:5px;}
.ready-pct{font-size:15px;font-weight:800;color:#3182f6;}
.ready-bar{height:8px;background:#eef1f6;border-radius:4px;overflow:hidden;}
.ready-fill{height:100%;width:67%;background:linear-gradient(90deg,#3182f6,#12b886);border-radius:4px;}
.ready-hint{font-size:11px;color:#8b95a1;margin-top:8px;}

/* 상담권 카드 */
.ticket{margin:0 16px 14px;background:linear-gradient(135deg,#12b886,#20c997);border-radius:16px;padding:18px;color:#fff;}
.tk-top{display:flex;align-items:center;justify-content:space-between;}
.tk-label{font-size:13px;font-weight:700;opacity:.95;display:flex;align-items:center;gap:6px;}
.tk-cnt{font-size:15px;font-weight:800;}
.tk-cnt b{font-size:22px;}
.tk-share{margin-top:14px;background:rgba(255,255,255,.2);border-radius:10px;padding:11px;text-align:center;font-size:13px;font-weight:700;}

/* 메뉴 리스트 */
.menu-group{margin:0 16px 14px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(60,80,140,.05);}
.menu{display:flex;align-items:center;gap:13px;padding:15px 18px;border-bottom:1px solid #f4f6fb;}
.menu:last-child{border-bottom:none;}
.menu-ic{width:22px;height:22px;color:#4e5968;flex-shrink:0;}
.menu-nm{flex:1;font-size:15px;font-weight:600;color:#191f28;}
.menu-val{font-size:13px;color:#8b95a1;}
.menu-arrow{color:#cbd2da;}

.tabbar{position:absolute;bottom:0;left:0;right:0;height:74px;background:#fff;border-top:1px solid #eef1f6;display:flex;padding:10px 2px 0;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#adb5bd;}
.tab.on{color:#3182f6;}
.tab svg{width:22px;height:22px;}

/* === 반응형: 모바일 꽉 참 + PC 폰 프레임 === */
@media (max-width:599px){
  body{background:#f4f6fb !important;padding:0 !important;}
  .phone{width:100% !important;max-width:100% !important;height:100vh !important;height:100dvh !important;border-radius:0 !important;box-shadow:none !important;}
}
</style></head>
