<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아 — 내 제안 · 미팅 · 받은 후기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* =========================================================
   모아 (가칭) — 영업사원 화면 (창업자 화면과 동일 토큰 계승)
   ========================================================= */
:root {
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;
  --fs-cap: 13px; --fs-sm: 15px; --fs-base: 17px;
  --fs-lg: 20px; --fs-xl: 26px; --fs-2xl: 34px; --fs-3xl: 42px;
  --radius: 16px; --radius-sm: 12px; --radius-lg: 22px;
  --maxw: 600px;
  --ease: cubic-bezier(.22,.61,.36,1);
  --accent: #5266eb;
  --accent-press: #4255d4;
  --ok: #2f9e6f;
  --ok-soft: #e6f4ee;
  --warn: #b8862a;
  --warn-soft: #f6efe0;
}
[data-theme="light"] {
  --bg: #f6f5f2;
  --surface: #ffffff;
  --surface-2: #efece5;
  --border: #e4e0d6;
  --border-strong: #d3cdbe;
  --text: #2a2924;
  --text-2: #5a5548;
  --text-3: #8a8478;
  --shadow: 0 1px 2px rgba(42,41,36,.03), 0 6px 20px rgba(42,41,36,.05);
  --accent-soft: #ecefff;
}
[data-theme="dark"] {
  --bg: #171721;
  --surface: #1e1e2a;
  --surface-2: #272735;
  --border: #2c2c3a;
  --border-strong: #3a3a4a;
  --text: #ededf3;
  --text-2: #a3a3b2;
  --text-3: #6f6f80;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 12px 32px rgba(0,0,0,.4);
  --accent: #5c70ef;
  --accent-soft: #232338;
  --ok: #4bbd8c;
  --ok-soft: #1c3029;
  --warn: #d3a44e;
  --warn-soft: #302a1c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  transition: background .4s var(--ease), color .4s var(--ease);
  -webkit-font-smoothing: antialiased;
}
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

/* ---------- 상단 바 ---------- */
.topbar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-4) var(--sp-5);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: var(--sp-2); font-weight: 800; font-size: var(--fs-lg); letter-spacing: -.02em; }
.brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
.brand small { font-weight: 500; font-size: var(--fs-cap); color: var(--text-3); letter-spacing: 0; }
.theme-btn {
  display: flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-2); cursor: pointer; transition: all .2s var(--ease);
}
.theme-btn:hover { color: var(--text); border-color: var(--border-strong); }
.theme-btn:active { transform: scale(.94); }

/* ---------- 헤더 ---------- */
.head { max-width: var(--maxw); margin: 0 auto; padding: var(--sp-6) var(--sp-5) var(--sp-4); }
.head .eyebrow { font-size: var(--fs-cap); font-weight: 600; color: var(--text-3); letter-spacing: .04em; text-transform: uppercase; margin-bottom: var(--sp-3); }
.head h1 { font-size: var(--fs-2xl); font-weight: 800; letter-spacing: -.03em; line-height: 1.25; margin-bottom: var(--sp-2); }
.head p { font-size: var(--fs-base); color: var(--text-2); }

/* ---------- 리스트 ---------- */
.list { max-width: var(--maxw); margin: 0 auto; padding: var(--sp-4) var(--sp-5) 120px; display: grid; gap: var(--sp-3); }

/* ---------- 제안 카드 ---------- */
.card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: var(--sp-5);
  transition: all .18s var(--ease); animation: fadeUp .4s var(--ease);
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.card-top { display: flex; align-items: flex-start; gap: var(--sp-4); }
.avatar {
  width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
  background: var(--accent-soft); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: var(--fs-xl); letter-spacing: -.02em;
}
.card-id { flex: 1; min-width: 0; }
.card-id .req-type { font-weight: 700; font-size: var(--fs-base); letter-spacing: -.01em; }
.card-id .req-meta { font-size: var(--fs-sm); color: var(--text-2); margin-top: 1px; }

/* 상태 배지 */
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: var(--fs-cap); font-weight: 700; padding: 5px 10px; border-radius: 99px; white-space: nowrap; }
.badge-wait { background: var(--surface-2); color: var(--text-3); }
.badge-turn { background: var(--warn-soft); color: var(--warn); }
.badge-ok { background: var(--ok-soft); color: var(--ok); }
.badge-half { background: var(--accent-soft); color: var(--accent); }

/* 조건 상세 칩 */
.req-chips { margin-top: var(--sp-4); padding-top: var(--sp-4); border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: var(--sp-2); }
.chip { font-size: var(--fs-cap); font-weight: 600; color: var(--text-2); background: var(--surface-2); padding: 5px 11px; border-radius: 99px; }

/* 확인 진행 표시 */
.confirm-row { display: flex; gap: var(--sp-4); margin-top: var(--sp-4); }
.confirm-item { display: flex; align-items: center; gap: 6px; font-size: var(--fs-cap); color: var(--text-3); }
.confirm-item.on { color: var(--ok); font-weight: 600; }
.confirm-item .cdot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; }
.confirm-item.on .cdot { background: var(--ok); border-color: var(--ok); }

/* 카드 액션 */
.card-actions { margin-top: var(--sp-4); display: flex; gap: var(--sp-2); }
.btn {
  font-family: inherit; font-size: var(--fs-sm); font-weight: 700; letter-spacing: -.01em;
  border-radius: var(--radius-sm); cursor: pointer; transition: all .18s var(--ease);
  border: 1.5px solid transparent; padding: var(--sp-3) var(--sp-4); flex: 1;
}
.btn-ok { background: var(--ok); color: #fff; }
.btn-ok:hover { filter: brightness(.95); }
.btn-ok:active { transform: scale(.99); }
.btn-outline { background: transparent; border-color: var(--border-strong); color: var(--text-2); }
.btn-done { background: var(--surface-2); color: var(--text-3); cursor: default; }

/* 받은 리뷰 박스 */
.review-box { margin-top: var(--sp-4); padding: var(--sp-4); background: var(--surface-2); border-radius: var(--radius-sm); }
.review-box .rv-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-3); }
.review-box .rv-title { font-size: var(--fs-sm); font-weight: 700; color: var(--text); }
.review-box .rv-avg { font-size: var(--fs-base); font-weight: 800; color: var(--warn); letter-spacing: -.02em; }
.review-box .rv-avg .star { font-size: var(--fs-cap); }
.rv-scores { display: grid; gap: var(--sp-2); }
.rv-line { display: flex; align-items: center; justify-content: space-between; font-size: var(--fs-cap); }
.rv-line .rv-k { color: var(--text-2); }
.rv-line .rv-stars { color: var(--warn); letter-spacing: 1px; }
.rv-comment { margin-top: var(--sp-3); padding-top: var(--sp-3); border-top: 1px solid var(--border); font-size: var(--fs-sm); color: var(--text-2); line-height: 1.6; font-style: italic; }

/* 빈 상태 / 로딩 */
.empty { text-align: center; padding: var(--sp-8) var(--sp-5); color: var(--text-3); }
.empty .empty-ic { font-size: 40px; margin-bottom: var(--sp-4); opacity: .5; }
.empty h3 { font-size: var(--fs-lg); font-weight: 700; color: var(--text-2); margin-bottom: var(--sp-2); }
.empty p { font-size: var(--fs-sm); }
.loading { text-align: center; padding: var(--sp-8); color: var(--text-3); font-size: var(--fs-sm); }
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand">
    <span class="dot"></span> 모아 <small>담당자</small>
  </div>
  <button class="theme-btn" id="themeBtn" aria-label="테마 전환">
    <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="head">
  <div class="eyebrow">내 제안</div>
  <h1>보낸 제안 현황이에요</h1>
  <p>창업자를 만난 뒤 미팅 완료를 눌러주세요. 양쪽 다 확인되면 후기가 열려요.</p>
</div>

<div class="list" id="list">
  <div class="loading">불러오는 중…</div>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     Supabase 연결 (창업자 화면과 동일 값)
     ============================================================ */
  const SUPABASE_URL = "https://wxecxkckbpgzcdegtahy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IVu4Fuyb8pKl5-ZkuYqoKA_iHKTwgpq";
  let sb = null;
  try {
    if (SUPABASE_URL.startsWith("http") && window.supabase) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
  } catch(e) { console.warn("Supabase 미연결:", e); }

  /* ============================================================
     현재 로그인한 영업사원 식별자 (rep_code)
     로그인 세션(sessionStorage 'moa_user')의 user_code 사용.
     미로그인 시 로그인 화면으로 이동. (개발용 fallback: rep_test_a)
     ============================================================ */
  const MOA_USER = (()=>{ try { return JSON.parse(sessionStorage.getItem('moa_user')||'null'); } catch(e){ return null; } })();
  // ⚠️ 배포 전: 아래 3줄 주석 해제 → 미로그인 시 로그인 화면으로 강제 이동
  // if (!MOA_USER || !MOA_USER.user_code) {
  //   location.href = 'login.html';
  // }
  const REP_CODE = (MOA_USER && MOA_USER.user_code) || "rep_test_a";  // fallback: 개발 테스트용

  const $ = s => document.querySelector(s);
  const listEl = $('#list');

  /* ---- 테마 토글 ---- */
  const themeBtn = $('#themeBtn'), themeIcon = $('#themeIcon');
  const sunIcon = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moonIcon = '<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>';
  themeBtn.addEventListener('click', ()=>{
    const b = document.body;
    const dark = b.getAttribute('data-theme') === 'dark';
    b.setAttribute('data-theme', dark ? 'light' : 'dark');
    themeIcon.innerHTML = dark ? sunIcon : moonIcon;
  });

  const checkIcon = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';

  /* ---- 상태 ---- */
  let rows = [];

  const SCORE_LABELS = {
    score_kindness:'친절도', score_accuracy:'설명 정확성', score_response:'응답 속도',
    score_fulfillment:'조건 이행', score_nopressure:'강매 없음'
  };

  /* ============================================================
     데이터 로드
     흐름: proposals(내가 보낸 제안, rep_code=나)
           → 각 제안의 창업자 조건(auction_requests)
           → 미팅 상태(meetings) → 받은 리뷰(reviews)
     ============================================================ */
  async function load(){
    if (!sb) { rows = demoData(); render(); return; }
    try {
      // 1) 내가 보낸 제안
      const { data: props, error: pErr } = await sb
        .from('proposals').select('*').eq('rep_code', REP_CODE);
      if (pErr) throw pErr;
      const proposals = props || [];
      const reqIds = [...new Set(proposals.map(p=>p.request_id).filter(Boolean))];

      // 2) 관련 창업자 조건
      let reqMap = {};
      if (reqIds.length) {
        const { data: reqs } = await sb
          .from('auction_requests').select('*').in('id', reqIds);
        (reqs||[]).forEach(r=>{ reqMap[r.id] = r; });
      }

      // 3) 내 미팅 전부
      const { data: mts } = await sb
        .from('meetings').select('*').eq('rep_code', REP_CODE);
      const meetingByProposal = {};
      (mts||[]).forEach(m=>{ meetingByProposal[m.proposal_id] = m; });

      // 4) 내가 받은 리뷰
      const { data: rvs } = await sb
        .from('reviews').select('*').eq('rep_code', REP_CODE);
      const reviewByMeeting = {};
      (rvs||[]).forEach(r=>{ reviewByMeeting[r.meeting_id] = r; });

      // 5) 병합
      rows = proposals.map(p=>{
        const req = reqMap[p.request_id] || {};
        const m = meetingByProposal[p.id] || null;
        const rv = (m && reviewByMeeting[m.id]) ? reviewByMeeting[m.id] : null;
        return {
          proposal_id: p.id,
          owner_code: req.owner_code || (m ? m.owner_code : ''),
          startup_type: req.startup_type || '창업 희망',
          budget: req.budget || '',
          region: req.region || '',
          meeting_id: m ? m.id : null,
          owner_confirmed: m ? m.owner_confirmed : false,
          rep_confirmed: m ? m.rep_confirmed : false,
          status: m ? m.status : '대기',
          review: rv
        };
      });
      render();
    } catch(e) {
      console.error('로드 실패:', e);
      listEl.innerHTML = '<div class="empty"><div class="empty-ic">⚠️</div><h3>불러오지 못했어요</h3><p>잠시 후 다시 시도해 주세요.</p></div>';
    }
  }

  function demoData(){
    return [
      { proposal_id:'d1', owner_code:'o1', startup_type:'처음 창업', budget:'5천만~1억', region:'서울 강남',
        meeting_id:null, owner_confirmed:false, rep_confirmed:false, status:'대기', review:null },
      { proposal_id:'d2', owner_code:'o2', startup_type:'업종 전환', budget:'1억~2억', region:'경기 성남',
        meeting_id:'m2', owner_confirmed:true, rep_confirmed:false, status:'대기', review:null },
      { proposal_id:'d3', owner_code:'o3', startup_type:'다점포', budget:'2억 이상', region:'인천',
        meeting_id:'m3', owner_confirmed:true, rep_confirmed:true, status:'완료',
        review:{ score_kindness:5, score_accuracy:5, score_response:4, score_fulfillment:5, score_nopressure:4, comment:'과장 없이 솔직하게 설명해주셔서 신뢰가 갔어요.' } }
    ];
  }

  /* ============================================================
     렌더링
     ============================================================ */
  function render(){
    if (!rows.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-ic">📤</div><h3>아직 보낸 제안이 없어요</h3><p>창업자 조건을 보고 제안을 보내보세요.</p></div>';
      return;
    }
    listEl.innerHTML = rows.map(cardHtml).join('');
    bindCards();
  }

  function cardHtml(r){
    const initial = (r.startup_type||'창')[0];

    // 상태 배지 (영업사원 시점)
    let badge;
    if (r.status === '완료') badge = '<span class="badge badge-ok">미팅 확인됨</span>';
    else if (r.owner_confirmed && !r.rep_confirmed) badge = '<span class="badge badge-turn">내 확인 차례</span>';
    else if (r.rep_confirmed && !r.owner_confirmed) badge = '<span class="badge badge-half">창업자 확인 대기</span>';
    else badge = '<span class="badge badge-wait">제안 발송됨</span>';

    // 조건 칩
    const chips = [r.budget, r.region].filter(Boolean)
      .map(c=>`<span class="chip">${escapeHtml(c)}</span>`).join('');
    const chipRow = chips ? `<div class="req-chips">${chips}</div>` : '';

    // 양측 확인 표시
    const ownerOn = r.owner_confirmed ? 'on' : '';
    const repOn = r.rep_confirmed ? 'on' : '';
    const confirmRow = `
      <div class="confirm-row">
        <span class="confirm-item ${repOn}"><span class="cdot">${r.rep_confirmed?checkIcon:''}</span>나</span>
        <span class="confirm-item ${ownerOn}"><span class="cdot">${r.owner_confirmed?checkIcon:''}</span>창업자</span>
      </div>`;

    // 액션 버튼
    let actions = '';
    if (r.status === '완료') {
      actions = ''; // 완료 시 버튼 대신 리뷰 박스 노출
    } else if (r.rep_confirmed) {
      actions = '<div class="card-actions"><button class="btn btn-outline" disabled>창업자 확인 기다리는 중</button></div>';
    } else {
      actions = `<div class="card-actions"><button class="btn btn-ok act-confirm" data-pid="${r.proposal_id}">미팅 완료</button></div>`;
    }

    // 받은 리뷰 박스
    const reviewBox = r.review ? reviewHtml(r.review) : '';

    return `
      <div class="card" data-pid="${r.proposal_id}">
        <div class="card-top">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div class="card-id">
            <div class="req-type">${escapeHtml(r.startup_type)}</div>
            <div class="req-meta">창업 희망 조건</div>
          </div>
          ${badge}
        </div>
        ${chipRow}
        ${confirmRow}
        ${actions}
        ${reviewBox}
      </div>`;
  }

  function reviewHtml(rv){
    const keys = Object.keys(SCORE_LABELS);
    const vals = keys.map(k=>rv[k]||0);
    const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
    const lines = keys.map(k=>{
      const v = rv[k]||0;
      const stars = '★'.repeat(v) + '☆'.repeat(5-v);
      return `<div class="rv-line"><span class="rv-k">${SCORE_LABELS[k]}</span><span class="rv-stars">${stars}</span></div>`;
    }).join('');
    const comment = rv.comment ? `<div class="rv-comment">"${escapeHtml(rv.comment)}"</div>` : '';
    return `
      <div class="review-box">
        <div class="rv-head">
          <span class="rv-title">창업자가 남긴 후기</span>
          <span class="rv-avg"><span class="star">★</span> ${avg}</span>
        </div>
        <div class="rv-scores">${lines}</div>
        ${comment}
      </div>`;
  }

  function bindCards(){
    document.querySelectorAll('.act-confirm').forEach(b=>{
      b.addEventListener('click', ()=>confirmMeeting(b.dataset.pid, b));
    });
  }

  /* ============================================================
     미팅 완료 (영업사원 쪽 확인) — rep_confirmed
     ============================================================ */
  async function confirmMeeting(pid, btn){
    const r = rows.find(x=>x.proposal_id===pid);
    if (!r) return;
    btn.disabled = true; btn.textContent = '처리 중…';

    if (!sb) {
      r.rep_confirmed = true;
      if (r.owner_confirmed) r.status = '완료';
      render(); return;
    }

    try {
      const now = new Date().toISOString();
      if (!r.meeting_id) {
        // 영업사원이 먼저 누른 경우 → 미팅 row 생성
        const { data, error } = await sb.from('meetings').insert([{
          proposal_id: r.proposal_id,
          owner_code: r.owner_code,
          rep_code: REP_CODE,
          rep_confirmed: true,
          rep_confirmed_at: now,
          status: '대기'
        }]).select().single();
        if (error) throw error;
        r.meeting_id = data.id;
        r.rep_confirmed = true;
      } else {
        const bothDone = r.owner_confirmed;
        const { error } = await sb.from('meetings').update({
          rep_confirmed: true,
          rep_confirmed_at: now,
          status: bothDone ? '완료' : '대기'
        }).eq('id', r.meeting_id);
        if (error) throw error;
        r.rep_confirmed = true;
        if (bothDone) r.status = '완료';
      }
      render();
    } catch(e) {
      console.error('미팅 확인 실패:', e);
      btn.disabled = false; btn.textContent = '미팅 완료';
      alert('처리 중 문제가 생겼어요. 잠시 후 다시 시도해 주세요.');
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  load();
})();
</script>
</body>
</html>
