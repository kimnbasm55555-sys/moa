<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',sans-serif;-webkit-font-smoothing:antialiased;}
body{background:#dde1e8;padding:20px;display:flex;justify-content:center;}
.phone{width:390px;background:#f4f6fb;border-radius:36px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.2);position:relative;height:844px;}
.status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:13px;font-weight:600;color:#191f28;}
svg{display:block;}
/* 딤 + 바텀시트 */
.dim{position:absolute;inset:0;background:rgba(25,31,40,.5);display:flex;align-items:flex-end;}
.sheet{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:24px 22px 30px;max-height:92%;overflow-y:auto;}
.sheet::-webkit-scrollbar{display:none;}
.grip{width:40px;height:4px;background:#e4e8ee;border-radius:2px;margin:0 auto 20px;}
.sh-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sh-ic{width:36px;height:36px;border-radius:11px;background:#fff0f0;display:flex;align-items:center;justify-content:center;}
.sh-ic svg{width:20px;height:20px;color:#ff5247;}
.sh-title{font-size:19px;font-weight:800;color:#191f28;}
.sh-sub{font-size:13px;color:#8b95a1;line-height:1.5;margin-bottom:20px;}
.sh-target{background:#f8fafc;border-radius:12px;padding:12px 14px;font-size:13px;color:#4e5968;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.sh-target b{color:#191f28;}
/* 사유 선택 */
.rlabel{font-size:13px;font-weight:700;color:#191f28;margin-bottom:10px;}
.reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.reason{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;background:#fff;border:1.5px solid #eef1f6;font-size:14px;font-weight:600;color:#4e5968;cursor:pointer;}
.reason.on{background:#fff0f0;border-color:#ff5247;color:#e03131;}
.reason .rk{width:18px;height:18px;border-radius:50%;border:1.5px solid #cbd2da;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.reason.on .rk{background:#ff5247;border-color:#ff5247;}
/* 근거 입력 */
.evidence{margin-bottom:16px;}
.evidence textarea{width:100%;min-height:90px;border:1.5px solid #eef1f6;border-radius:12px;padding:13px;font-size:14px;font-family:inherit;color:#191f28;resize:none;background:#fff;}
.evidence textarea::placeholder{color:#adb5bd;}
.notice{font-size:12px;color:#8b95a1;line-height:1.5;background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:18px;display:flex;gap:7px;align-items:flex-start;}
.notice svg{flex-shrink:0;margin-top:1px;color:#adb5bd;}
.submit{width:100%;background:#ff5247;color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;font-family:inherit;}
</style></head>
<body>
<div class="phone">
  <div class="status"><span>11:55</span><span>&#128246; &#128267;</span></div>
  <div class="dim">
    <div class="sheet">
      <div class="grip"></div>
      <div class="sh-head">
        <div class="sh-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9L1.8 18a2 2 0 001.7 3h17a2 2 0 001.7-3L13.7 3.9a2 2 0 00-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg></div>
        <div class="sh-title">브랜드 신고하기</div>
      </div>
      <div class="sh-sub">상담 내용이 등록된 정보와 다른가요? 신고 내용은 운영팀이 검토합니다.</div>

      <div class="sh-target"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8b95a1" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/></svg>신고 대상 · <b>○○커피 지원팀</b></div>

      <div class="rlabel">어떤 문제가 있었나요?</div>
      <div class="reasons">
        <div class="reason on"><span class="rk"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>우대사항이 실제와 달라요</div>
        <div class="reason"><span class="rk"></span>원가율·매출을 과장했어요</div>
        <div class="reason"><span class="rk"></span>약속한 지원을 안 해줘요</div>
        <div class="reason"><span class="rk"></span>상담 중 연락이 끊겼어요</div>
        <div class="reason"><span class="rk"></span>기타 (직접 작성)</div>
      </div>

      <div class="rlabel">구체적인 내용을 알려주세요</div>
      <div class="evidence">
        <textarea placeholder="예: 홈에 '가맹비 1,000만 면제'로 되어 있었는데, 상담에서는 500만원만 할인된다고 했어요."></textarea>
      </div>

      <div class="notice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
        허위 신고 시 이용이 제한될 수 있어요. 서로 다른 이용자의 신고가 누적되면 운영팀이 검토 후 조치합니다.
      </div>

      <button class="submit">신고 접수하기</button>
    </div>
  </div>
</div>
</body></html>
