<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아 — 영업사원</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:28px;--sp-7:40px;
  --fs-cap:12px;--fs-xs:13px;--fs-sm:14px;--fs-base:16px;--fs-lg:19px;--fs-xl:23px;--fs-2xl:27px;
  --radius:14px;--radius-sm:10px;--maxw:560px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --accent:#4263eb;--accent-press:#3a56d4;
}
[data-theme="light"]{
  --bg:#f4f5f7;--surface:#ffffff;--surface-2:#eef0f3;--hover:#fafbfc;
  --border:#e6e8ec;--border-strong:#d5d9df;
  --text:#1a1c1f;--text-2:#5c636e;--text-muted:#9aa0ab;
  --shadow:0 1px 2px rgba(20,22,26,.03),0 6px 20px rgba(20,22,26,.05);
  --accent-soft:#eef1ff;--good:#12b886;
}
[data-theme="dark"]{
  --bg:#16181d;--surface:#1c1f26;--surface-2:#22262e;--hover:#22262e;
  --border:#2a2e37;--border-strong:#373c47;
  --text:#eceef1;--text-2:#a0a6b0;--text-muted:#6b7280;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.4);
  --accent:#5c7cfa;--accent-soft:#232838;--good:#20c997;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:var(--sp-7);
  transition:background .35s var(--ease),color .35s var(--ease)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  padding:var(--sp-4) var(--sp-5);background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:var(--sp-2);font-weight:800;font-size:var(--fs-lg);letter-spacing:-.02em}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.brand small{font-weight:600;font-size:var(--fs-cap);color:#fff;background:var(--accent);padding:2px 7px;border-radius:99px}
[data-theme="dark"] .brand small{color:#0c0f18}
.theme-btn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;
  background:transparent;border:1px solid var(--border);color:var(--text-2);cursor:pointer;transition:all .2s var(--ease)}
.theme-btn:hover{color:var(--text);border-color:var(--border-strong)}

.head{max-width:var(--maxw);margin:0 auto;padding:var(--sp-6) var(--sp-5) var(--sp-4)}
.head h1{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-.03em}
.head .sub{font-size:var(--fs-sm);color:var(--text-2);margin-top:var(--sp-2)}
.head .sub b{color:var(--accent);font-weight:700}

.list{max-width:var(--maxw);margin:0 auto;padding:0 var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-3)}

/* 조건 카드 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:var(--sp-5);box-shadow:var(--shadow)}
.card-top{display:flex;align-items:center;gap:var(--sp-3);margin-bottom:var(--sp-4)}
.badge-type{font-size:var(--fs-cap);font-weight:700;color:var(--accent);background:var(--accent-soft);
  padding:5px 11px;border-radius:99px}
.card-time{font-size:var(--fs-cap);color:var(--text-muted);margin-left:auto}
.cond-grid{display:flex;flex-direction:column;gap:var(--sp-3);margin-bottom:var(--sp-4)}
.cond-row{display:flex;align-items:baseline;gap:var(--sp-3);font-size:var(--fs-sm)}
.cond-row .k{color:var(--text-muted);width:64px;flex-shrink:0;font-size:var(--fs-xs)}
.cond-row .v{color:var(--text);font-weight:600}
.cond-memo{font-size:var(--fs-sm);color:var(--text-2);background:var(--surface-2);
  padding:var(--sp-3) var(--sp-4);border-radius:var(--radius-sm);line-height:1.6;margin-bottom:var(--sp-4)}
.btn-propose{width:100%;font-family:inherit;font-size:var(--fs-sm);font-weight:700;
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;cursor:pointer;transition:background .18s var(--ease)}
[data-theme="dark"] .btn-propose{color:#0c0f18}
.btn-propose:hover{background:var(--accent-press)}
.btn-propose.done{background:var(--surface-2);color:var(--text-muted);cursor:default}

.empty{max-width:var(--maxw);margin:var(--sp-7) auto;padding:0 var(--sp-5);text-align:center;color:var(--text-muted)}
.empty .ic{font-size:40px;margin-bottom:var(--sp-3);opacity:.4}
.loading{max-width:var(--maxw);margin:var(--sp-7) auto;text-align:center;color:var(--text-muted);font-size:var(--fs-sm)}

/* 제안 작성 모달 */
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.5);display:none;
  align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{background:var(--bg);width:100%;max-width:var(--maxw);border-radius:20px 20px 0 0;
  padding:var(--sp-5);max-height:88vh;overflow-y:auto;animation:up .3s var(--ease)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h2{font-size:var(--fs-xl);font-weight:800;letter-spacing:-.02em;margin-bottom:var(--sp-2)}
.sheet .sh-sub{font-size:var(--fs-sm);color:var(--text-2);margin-bottom:var(--sp-5)}
.field{margin-bottom:var(--sp-4)}
.field label{display:block;font-size:var(--fs-xs);font-weight:600;color:var(--text-2);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:12px var(--sp-4);font-size:var(--fs-sm);font-family:inherit;
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field .opt-label{color:var(--text-muted);font-weight:400}
.sheet-actions{display:flex;gap:var(--sp-3);margin-top:var(--sp-5)}
.btn-cancel{flex:0 0 auto;padding:14px 20px;font-family:inherit;font-size:var(--fs-sm);font-weight:600;
  background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-2);cursor:pointer}
.btn-send{flex:1;padding:14px;font-family:inherit;font-size:var(--fs-base);font-weight:700;
  background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer}
[data-theme="dark"] .btn-send{color:#0c0f18}
.btn-send:disabled{background:var(--surface-2);color:var(--text-muted);cursor:not-allowed}
.hint-box{font-size:var(--fs-cap);color:var(--text-muted);background:var(--surface-2);
  padding:10px var(--sp-3);border-radius:8px;margin-bottom:var(--sp-4);line-height:1.5}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="brand"><span class="dot"></span> 모아 <small>영업</small></div>
  <button class="theme-btn" id="themeBtn" aria-label="테마 전환">
    <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
  </button>
</div>

<div class="head">
  <h1>새 창업 조건</h1>
  <div class="sub"><b id="count">-</b>명이 조건을 등록했어요. 맞는 분께 제안하세요.</div>
</div>

<div class="loading" id="loading">조건을 불러오는 중...</div>
<div class="list" id="list"></div>
<div class="empty" id="empty" style="display:none">
  <div class="ic">📭</div>
  아직 등록된 조건이 없어요.<br>창업자가 조건을 올리면 여기 나타나요.
</div>

<!-- 제안 작성 모달 -->
<div class="modal" id="modal">
  <div class="sheet">
    <h2>제안 보내기</h2>
    <div class="sh-sub" id="targetInfo">—</div>
    <div class="hint-box">💡 매출 정보는 넣지 않아요. 제공 혜택과 진심으로 승부하세요.</div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="repName" placeholder="예: 이현우">
    </div>
    <div class="field">
      <label>브랜드 <span class="opt-label">(정식 오픈 시 승인제로 변경)</span></label>
      <input type="text" id="repBrand" placeholder="예: 프리미엄 버거 브랜드">
    </div>
    <div class="field">
      <label>경력 한 줄</label>
      <input type="text" id="repCareer" placeholder="예: 버거 브랜드 4년차">
    </div>
    <div class="field">
      <label>좌우명 <span class="opt-label">(선택 · 있으면 선택률↑)</span></label>
      <input type="text" id="repMotto" placeholder="예: 무리한 권유는 하지 않습니다">
    </div>
    <div class="field">
      <label>제공 혜택</label>
      <input type="text" id="offerBenefit" placeholder="예: 가맹비 500만원 할인 · 인테리어 지원">
    </div>
    <div class="field">
      <label>한마디</label>
      <textarea id="message" placeholder="창업자에게 하고 싶은 말을 적어주세요."></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" id="btnCancel">취소</button>
      <button class="btn-send" id="btnSend" disabled>제안 보내기</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const $=s=>document.querySelector(s);

  /* Supabase 연결 (조건등록과 같은 프로젝트) */
  const SUPABASE_URL = "https://wxecxkckbpgzcdegtahy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IVu4Fuyb8pKl5-ZkuYqoKA_iHKTwgpq";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* 테마 */
  const themeBtn=$('#themeBtn'),themeIcon=$('#themeIcon');
  const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon='<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>';
  themeBtn.addEventListener('click',()=>{
    const d=document.body.getAttribute('data-theme')==='dark';
    document.body.setAttribute('data-theme',d?'light':'dark');
    themeIcon.innerHTML=d?sun:moon;
  });

  const typeLabel={'처음 창업':'처음 창업','장사 경험 있음':'경험 있음','업종 전환':'업종 전환'};
  function timeAgo(ts){
    if(!ts) return '';
    const diff=(Date.now()-new Date(ts).getTime())/1000;
    if(diff<60) return '방금';
    if(diff<3600) return Math.floor(diff/60)+'분 전';
    if(diff<86400) return Math.floor(diff/3600)+'시간 전';
    return Math.floor(diff/86400)+'일 전';
  }
  function arr(v){ return Array.isArray(v)?v.join(', '):(v||'—'); }

  let currentTarget=null;

  /* 조건 리스트 불러오기 */
  async function loadRequests(){
    const { data, error } = await sb
      .from('auction_requests')
      .select('*')
      .eq('status','open')
      .order('created_at',{ascending:false});

    $('#loading').style.display='none';
    if(error){
      $('#loading').style.display='block';
      $('#loading').textContent='불러오기 실패: '+error.message;
      return;
    }
    $('#count').textContent=(data?data.length:0);
    if(!data || data.length===0){ $('#empty').style.display='block'; return; }

    $('#list').innerHTML=data.map(r=>`
      <div class="card">
        <div class="card-top">
          <span class="badge-type">${typeLabel[r.startup_type]||r.startup_type||'창업'}</span>
          <span class="card-time">${timeAgo(r.created_at)}</span>
        </div>
        <div class="cond-grid">
          <div class="cond-row"><span class="k">예산</span><span class="v">${r.budget||'—'}</span></div>
          <div class="cond-row"><span class="k">업종</span><span class="v">${arr(r.industry)}</span></div>
          <div class="cond-row"><span class="k">지역</span><span class="v">${arr(r.region)}</span></div>
          ${r.timing?`<div class="cond-row"><span class="k">시기</span><span class="v">${r.timing}</span></div>`:''}
        </div>
        ${r.memo?`<div class="cond-memo">"${r.memo}"</div>`:''}
        <button class="btn-propose" data-id="${r.id}" data-label="${(typeLabel[r.startup_type]||'')} · ${r.budget||''} · ${arr(r.industry)}">제안 보내기</button>
      </div>
    `).join('');

    document.querySelectorAll('.btn-propose').forEach(btn=>{
      btn.addEventListener('click',()=>openModal(btn.dataset.id, btn.dataset.label, btn));
    });
  }

  /* 모달 */
  const modal=$('#modal');
  let activeBtn=null;
  function openModal(id,label,btn){
    currentTarget=id; activeBtn=btn;
    $('#targetInfo').textContent=label;
    modal.classList.add('on');
  }
  $('#btnCancel').addEventListener('click',()=>modal.classList.remove('on'));
  modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.remove('on'); });

  /* 필수 입력 체크 */
  const req=['#repName','#repBrand','#repCareer','#offerBenefit'];
  function checkForm(){
    const ok=req.every(s=>$(s).value.trim());
    $('#btnSend').disabled=!ok;
  }
  req.forEach(s=>$(s).addEventListener('input',checkForm));
  $('#message').addEventListener('input',checkForm);

  /* 제안 전송 */
  $('#btnSend').addEventListener('click',async ()=>{
    $('#btnSend').disabled=true; $('#btnSend').textContent='보내는 중...';
    const { error } = await sb.from('proposals').insert([{
      request_id: currentTarget,
      rep_name: $('#repName').value.trim(),
      rep_brand: $('#repBrand').value.trim(),
      rep_career: $('#repCareer').value.trim(),
      rep_motto: $('#repMotto').value.trim(),
      offer_benefit: $('#offerBenefit').value.trim(),
      message: $('#message').value.trim()
    }]);
    if(error){
      $('#btnSend').disabled=false; $('#btnSend').textContent='제안 보내기';
      alert('전송 실패: '+error.message); return;
    }
    modal.classList.remove('on');
    $('#btnSend').textContent='제안 보내기';
    // 버튼 완료 표시
    if(activeBtn){ activeBtn.textContent='✓ 제안 완료'; activeBtn.classList.add('done'); activeBtn.disabled=true; }
    // 입력 초기화
    ['#repName','#repBrand','#repCareer','#repMotto','#offerBenefit','#message'].forEach(s=>$(s).value='');
  });

  loadRequests();
})();
</script>
</body>
</html>
