<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모아 — 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px; --sp-8:64px;
  --fs-cap:13px; --fs-sm:15px; --fs-base:17px; --fs-lg:20px; --fs-xl:26px; --fs-2xl:34px;
  --radius:16px; --radius-sm:12px; --radius-lg:22px; --maxw:440px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --accent:#5266eb; --accent-press:#4255d4;
  --ok:#2f9e6f; --ok-soft:#e6f4ee; --danger:#c65b4e;
}
[data-theme="light"] {
  --bg:#f6f5f2; --surface:#ffffff; --surface-2:#efece5; --border:#e4e0d6; --border-strong:#d3cdbe;
  --text:#2a2924; --text-2:#5a5548; --text-3:#8a8478;
  --shadow:0 1px 2px rgba(42,41,36,.03),0 6px 20px rgba(42,41,36,.05); --accent-soft:#ecefff;
}
[data-theme="dark"] {
  --bg:#171721; --surface:#1e1e2a; --surface-2:#272735; --border:#2c2c3a; --border-strong:#3a3a4a;
  --text:#ededf3; --text-2:#a3a3b2; --text-3:#6f6f80;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.4);
  --accent:#5c70ef; --accent-soft:#232338; --ok:#4bbd8c; --danger:#dd7568;
}
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; }
body {
  font-family:'Pretendard',-apple-system,sans-serif; background:var(--bg); color:var(--text);
  line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:var(--sp-5);
  transition:background .4s var(--ease),color .4s var(--ease);
}
@media (prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important;} }

.auth { width:100%; max-width:var(--maxw); animation:fadeUp .4s var(--ease); }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:none;} }

.brand { display:flex; align-items:center; justify-content:center; gap:var(--sp-2); margin-bottom:var(--sp-6); font-weight:800; font-size:var(--fs-xl); letter-spacing:-.02em; }
.brand .dot { width:11px; height:11px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 5px var(--accent-soft); }
.brand small { font-weight:500; font-size:var(--fs-cap); color:var(--text-3); }

.card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius-lg); padding:var(--sp-6); }
.card h1 { font-size:var(--fs-xl); font-weight:800; letter-spacing:-.02em; margin-bottom:var(--sp-1); }
.card .sub { font-size:var(--fs-sm); color:var(--text-2); margin-bottom:var(--sp-5); }

/* 역할 선택 (회원가입) */
.role-tabs { display:flex; gap:var(--sp-2); margin-bottom:var(--sp-5); }
.role-tab { flex:1; font-family:inherit; font-size:var(--fs-sm); font-weight:700; padding:var(--sp-4); border-radius:var(--radius-sm);
  background:var(--surface-2); border:1.5px solid transparent; color:var(--text-2); cursor:pointer; transition:all .16s var(--ease); }
.role-tab.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

.field { margin-bottom:var(--sp-4); }
.field label { display:block; font-size:var(--fs-cap); font-weight:600; color:var(--text-2); margin-bottom:var(--sp-2); }
.field input {
  width:100%; padding:var(--sp-4); font-size:var(--fs-base); font-family:inherit;
  background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius-sm); color:var(--text);
  transition:border-color .18s var(--ease);
}
.field input:focus { outline:none; border-color:var(--accent); }

.msg { font-size:var(--fs-cap); padding:var(--sp-3) var(--sp-4); border-radius:var(--radius-sm); margin-bottom:var(--sp-4); display:none; }
.msg.show { display:block; animation:fadeUp .25s var(--ease); }
.msg.error { background:color-mix(in srgb,var(--danger) 12%,transparent); color:var(--danger); }
.msg.ok { background:var(--ok-soft); color:var(--ok); }

.btn { width:100%; font-family:inherit; font-size:var(--fs-base); font-weight:700; letter-spacing:-.01em;
  border-radius:var(--radius-sm); cursor:pointer; transition:all .18s var(--ease); border:none;
  padding:var(--sp-4) var(--sp-5); background:var(--accent); color:#fff; }
[data-theme="dark"] .btn { color:#06120d; }
.btn:hover { background:var(--accent-press); }
.btn:active { transform:scale(.99); }
.btn:disabled { opacity:.6; cursor:not-allowed; }

.switch { text-align:center; margin-top:var(--sp-5); font-size:var(--fs-sm); color:var(--text-2); }
.switch button { background:none; border:none; color:var(--accent); font-weight:700; font-family:inherit; font-size:var(--fs-sm); cursor:pointer; }
.switch button:hover { text-decoration:underline; }

.theme-btn { position:fixed; top:var(--sp-4); right:var(--sp-4); width:40px; height:40px; border-radius:50%;
  background:var(--surface); border:1px solid var(--border); color:var(--text-2); cursor:pointer;
  display:flex; align-items:center; justify-content:center; }

.hidden { display:none !important; }
</style>
</head>
<body data-theme="light">

<button class="theme-btn" id="themeBtn" aria-label="테마 전환">
  <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
</button>

<div class="auth">
  <div class="brand"><span class="dot"></span> 모아 <small>가칭</small></div>

  <!-- 로그인 -->
  <div class="card" id="loginCard">
    <h1>로그인</h1>
    <p class="sub">창업자와 담당자를 이어주는 모아예요.</p>
    <div class="msg" id="loginMsg"></div>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="loginId" autocomplete="username" placeholder="아이디를 입력하세요">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="loginPw" autocomplete="current-password" placeholder="비밀번호를 입력하세요">
    </div>
    <button class="btn" id="loginBtn">로그인</button>
    <div class="switch">아직 계정이 없으신가요? <button id="toSignup">회원가입</button></div>
  </div>

  <!-- 회원가입 -->
  <div class="card hidden" id="signupCard">
    <h1>회원가입</h1>
    <p class="sub">어떤 목적으로 모아를 이용하시나요?</p>
    <div class="role-tabs">
      <button class="role-tab on" data-role="founder">창업 준비 중이에요</button>
      <button class="role-tab" data-role="rep">브랜드 담당자예요</button>
    </div>
    <div class="msg" id="signupMsg"></div>
    <div class="field">
      <label>이름</label>
      <input type="text" id="suName" placeholder="이름 또는 상호">
    </div>
    <div class="field">
      <label>아이디</label>
      <input type="text" id="suId" autocomplete="username" placeholder="사용할 아이디">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input type="password" id="suPw" autocomplete="new-password" placeholder="비밀번호 (4자 이상)">
    </div>
    <div class="field">
      <label>연락처 (선택)</label>
      <input type="tel" id="suPhone" placeholder="010-0000-0000">
    </div>
    <button class="btn" id="signupBtn">가입하고 시작하기</button>
    <div class="switch">이미 계정이 있으신가요? <button id="toLogin">로그인</button></div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const SUPABASE_URL = "https://wxecxkckbpgzcdegtahy.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IVu4Fuyb8pKl5-ZkuYqoKA_iHKTwgpq";
  let sb = null;
  try { if (SUPABASE_URL.startsWith("http") && window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
  catch(e){ console.warn("Supabase 미연결:", e); }

  const $ = s=>document.querySelector(s);

  /* 이미 로그인돼 있으면 바로 이동 */
  const existing = sessionStorage.getItem('moa_user');
  if (existing) {
    try { redirectByRole(JSON.parse(existing)); } catch(e){}
  }

  /* 테마 */
  const themeBtn=$('#themeBtn'), themeIcon=$('#themeIcon');
  const sun='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const moon='<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>';
  themeBtn.addEventListener('click',()=>{ const b=document.body,d=b.getAttribute('data-theme')==='dark'; b.setAttribute('data-theme',d?'light':'dark'); themeIcon.innerHTML=d?sun:moon; });

  /* 로그인 ↔ 회원가입 전환 */
  $('#toSignup').addEventListener('click',()=>{ $('#loginCard').classList.add('hidden'); $('#signupCard').classList.remove('hidden'); });
  $('#toLogin').addEventListener('click',()=>{ $('#signupCard').classList.add('hidden'); $('#loginCard').classList.remove('hidden'); });

  /* 역할 선택 */
  let selRole = 'founder';
  document.querySelectorAll('.role-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.role-tab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on'); selRole = t.dataset.role;
  }));

  function showMsg(id, text, type){
    const el=$(id); el.textContent=text; el.className='msg show '+type;
  }
  function hideMsg(id){ $(id).className='msg'; }

  /* RPC 호출 */
  async function rpc(fn, body){
    if (!sb) return { ok:false, error:'서버에 연결할 수 없어요' };
    const { data, error } = await sb.rpc(fn, body);
    if (error) return { ok:false, error:'처리 중 문제가 생겼어요' };
    return data;
  }

  /* 로그인 후 역할별 이동 */
  function redirectByRole(user){
    // 세션 저장
    sessionStorage.setItem('moa_user', JSON.stringify(user));
    // 역할별 첫 화면 (실제 배포 시 파일명/경로에 맞게)
    if (user.role === 'rep') {
      location.href = 'rep-meetings.html';
    } else {
      location.href = 'brand-finder.html';
    }
  }

  /* 로그인 */
  $('#loginBtn').addEventListener('click', async ()=>{
    const id=$('#loginId').value.trim(), pw=$('#loginPw').value;
    hideMsg('#loginMsg');
    if (!id || !pw){ showMsg('#loginMsg','아이디와 비밀번호를 입력해주세요.','error'); return; }
    const btn=$('#loginBtn'); btn.disabled=true; btn.textContent='로그인 중…';
    const r = await rpc('login_user', { p_login_id:id, p_password:pw });
    btn.disabled=false; btn.textContent='로그인';
    if (r && r.ok){
      showMsg('#loginMsg','로그인 성공! 이동 중…','ok');
      setTimeout(()=>redirectByRole(r.user), 500);
    } else {
      showMsg('#loginMsg', (r && r.error) || '로그인에 실패했어요.', 'error');
    }
  });
  // 엔터로 로그인
  $('#loginPw').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#loginBtn').click(); });

  /* 회원가입 */
  $('#signupBtn').addEventListener('click', async ()=>{
    const name=$('#suName').value.trim(), id=$('#suId').value.trim(), pw=$('#suPw').value, phone=$('#suPhone').value.trim();
    hideMsg('#signupMsg');
    if (!id || !pw){ showMsg('#signupMsg','아이디와 비밀번호는 필수예요.','error'); return; }
    if (pw.length < 4){ showMsg('#signupMsg','비밀번호는 4자 이상으로 해주세요.','error'); return; }
    const btn=$('#signupBtn'); btn.disabled=true; btn.textContent='가입 중…';
    const r = await rpc('signup_user', { p_login_id:id, p_password:pw, p_role:selRole, p_name:name||null, p_phone:phone||null });
    btn.disabled=false; btn.textContent='가입하고 시작하기';
    if (r && r.ok){
      showMsg('#signupMsg','가입 완료! 바로 시작할게요.','ok');
      setTimeout(()=>redirectByRole(r.user), 600);
    } else {
      showMsg('#signupMsg', (r && r.error) || '가입에 실패했어요.', 'error');
    }
  });
})();
</script>
</body>
</html>
